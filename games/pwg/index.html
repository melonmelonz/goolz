<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0c0a14">
<meta name="description" content="Playing With Goolz — a small four-wisp parlour game. Four lanterns enter, one drifts home.">
<meta property="og:title" content="Playing With Goolz">
<meta property="og:description" content="A small four-wisp parlour game. Four lanterns enter, one drifts home.">
<meta property="og:image" content="/games/pwg/og.png">
<meta property="og:type" content="website">
<title>Playing With Goolz</title>
<style>
  :root {
    --bg: #0c0a14;       /* midnight */
    --bg2: #1a1430;      /* haunt */
    --fg: #e8e6d0;       /* bone */
    --accent: #b6a4dc;   /* candleflame violet */
    --accent2: #b9d3a4;  /* faint ectoplasm */
    --panel: #1a1530;
    --panel2: #2a2244;
    --ink: #0a0712;
    --muted: #6e6585;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(ellipse at top, var(--bg2), var(--bg));
    color: var(--fg);
    font-family: 'Trebuchet MS', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  body { display: flex; align-items: center; justify-content: center; }
  /* Subtle CRT vignette over the whole page */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%);
    z-index: 100;
  }
  h1 { margin: 0; font-size: 32px; letter-spacing: 4px;
       text-shadow: 0 0 14px rgba(182,164,220,.55), 0 2px 0 #000;
       font-weight: 700; }
  h1 .accent { color: var(--accent2); text-shadow: 0 0 14px rgba(185,211,164,.55), 0 2px 0 #000; }
  button {
    font: inherit;
    background: linear-gradient(180deg, #2a2244, #1a1530);
    color: var(--fg); border: 1px solid var(--accent);
    padding: 10px 18px; border-radius: 8px;
    cursor: pointer; font-weight: 600; letter-spacing: 2px;
    box-shadow: 0 2px 0 var(--ink), inset 0 0 0 1px rgba(182,164,220,.15);
    transition: transform .05s, box-shadow .12s, border-color .12s;
  }
  button:hover { border-color: var(--accent2); box-shadow: 0 2px 0 var(--ink), 0 0 14px rgba(185,211,164,.18); }
  button:active { transform: translateY(2px); box-shadow: 0 0 0 var(--ink); }
  button.alt { border-color: var(--accent2); }
  button.alt:hover { border-color: var(--accent); box-shadow: 0 2px 0 var(--ink), 0 0 14px rgba(182,164,220,.18); }
  button:disabled { filter: grayscale(.6) brightness(.7); cursor: not-allowed; }
  input[type=text] {
    font: inherit; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--panel2);
    background: var(--ink); color: var(--fg); outline: none; min-width: 180px;
    text-transform: uppercase; letter-spacing: 2px;
  }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(182,164,220,.18); }
  input[name=name] { text-transform: none; letter-spacing: 0; }

  /* LOBBY */
  #lobby {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg2) 100%);
    border: 1px solid var(--panel2);
    border-radius: 14px;
    padding: 32px 40px 28px;
    box-shadow: 0 0 60px rgba(182,164,220,.08), 0 12px 30px rgba(0,0,0,.6);
    width: min(560px, 92vw);
    text-align: center;
  }
  #lobby p.tag { margin: 8px 0 22px; font-size: 13px; opacity: .65; letter-spacing: 1px; font-style: italic; }
  .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
  .roster { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 16px 0; }
  .slot {
    background: var(--ink); border: 1px solid var(--panel2); border-radius: 10px;
    padding: 10px; min-height: 60px; display: flex; align-items: center; gap: 10px;
    text-align: left; position: relative;
  }
  .slot.host { border-color: var(--accent2); }
  .slot.mine { border-color: var(--accent); box-shadow: 0 0 10px rgba(182,164,220,.25); }
  .slot.ai { border-style: dashed; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,.25), 0 0 8px currentColor; }
  .slotname { font-weight: 600; font-size: 14px; }
  .slotinfo { font-size: 11px; opacity: .65; font-style: italic; }
  .empty .swatch { background: var(--panel2); opacity: .35; box-shadow: none; }
  .empty .slotname { opacity: .4; font-style: italic; }
  .slotbtn {
    margin-left: auto; padding: 4px 10px; font-size: 11px; border-radius: 6px;
    background: transparent; color: var(--fg); border: 1px solid var(--accent);
    cursor: pointer; box-shadow: none; letter-spacing: 1px;
  }
  .slotbtn:hover { background: var(--accent); color: var(--ink); }
  .slotbtn.unclaim { border-color: var(--accent2); }
  .slotbtn.unclaim:hover { background: var(--accent2); color: var(--ink); }
  .specrow {
    margin-top: 8px; padding: 8px 12px; background: var(--ink);
    border: 1px dashed var(--panel2); border-radius: 8px;
    text-align: left; font-size: 12px; min-height: 36px;
  }
  .specrow .label { opacity: .5; font-weight: 600; letter-spacing: 2px; font-size: 10px; }
  .specchip {
    display: inline-block; background: var(--panel2); padding: 3px 8px;
    border-radius: 12px; margin: 2px 3px; font-size: 11px;
  }
  .specchip.me { background: var(--accent); color: var(--ink); }
  .roomcode { font-size: 30px; font-weight: 700; letter-spacing: 8px; color: var(--accent2);
              text-shadow: 0 0 12px rgba(185,211,164,.45); margin: 6px 0; cursor: pointer;
              font-family: 'Courier New', monospace; }
  .roomcode:hover { opacity: .85; }
  .hint { font-size: 12px; opacity: .55; letter-spacing: 1px; }
  #status { margin-top: 12px; min-height: 20px; font-size: 13px; color: var(--accent2); font-style: italic; }
  /* small floating top-right buttons (audio + fullscreen) */
  #audio-toggle, #fs-toggle {
    position: fixed; top: 14px; z-index: 50;
    width: 36px; height: 36px; border-radius: 50%; padding: 0;
    border: 1px solid var(--panel2); background: var(--ink);
    color: var(--accent); font-size: 16px; letter-spacing: 0;
    box-shadow: 0 0 12px rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
  }
  #audio-toggle { right: 14px; }
  #fs-toggle    { right: 58px; }
  #audio-toggle.muted { color: var(--muted); }
  #audio-toggle:hover, #fs-toggle:hover { border-color: var(--accent); }

  /* Fullscreen mode: canvas grows to fit viewport while preserving 15:11 aspect.
     Lobby is gone by then; HUD + controls-help collapse out of the way. */
  :fullscreen body, :fullscreen #game {
    background: #050310;
  }
  :fullscreen #game {
    width: 100vw; height: 100vh;
    justify-content: center;
    gap: 6px;
  }
  :fullscreen #hud {
    width: min(960px, 96vw);
    margin-top: 4px;
  }
  :fullscreen canvas {
    width: auto;
    height: min(calc(100vh - 110px), calc((100vw - 16px) * 11 / 15));
    aspect-ratio: 15 / 11;
    max-width: calc(100vw - 16px);
    max-height: calc(100vh - 110px);
  }
  :fullscreen .controls-help { font-size: 11px; opacity: .45; }

  /* GAME */
  #game { display: none; flex-direction: column; align-items: center; gap: 8px; }
  #hud {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    width: 960px; max-width: 96vw;
  }
  .pcard {
    background: var(--panel); border: 1px solid var(--panel2); border-radius: 8px;
    padding: 6px 10px; display: flex; align-items: center; gap: 8px; font-size: 13px;
    min-width: 180px;
  }
  .pcard.dead { opacity: .3; }
  .pcard.dead .pname { text-decoration: line-through; }
  .pcard.me { border-color: var(--accent2); box-shadow: 0 0 8px rgba(185,211,164,.25); }
  .pswatch { width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }
  .stat { opacity: .8; font-variant-numeric: tabular-nums; }
  canvas {
    background: #0a0814;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 960px; height: 704px; max-width: 96vw; max-height: calc(100vh - 160px);
    border: 1px solid var(--panel2);
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(182,164,220,.12), inset 0 0 30px rgba(0,0,0,.5);
  }
  #overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(10,4,18,.85); backdrop-filter: blur(6px);
    z-index: 10;
  }
  #overlay .card {
    background: var(--panel); border: 1px solid var(--accent2); border-radius: 12px;
    padding: 32px 48px; text-align: center;
    box-shadow: 0 0 40px rgba(185,211,164,.18), 0 12px 30px rgba(0,0,0,.6);
  }
  #overlay h2 { margin: 0 0 16px; font-size: 28px; letter-spacing: 4px; font-weight: 600; }
  .controls-help {
    font-size: 12px; opacity: .55; text-align: center; margin-top: 4px; letter-spacing: 1px;
  }
  .controls-help kbd {
    background: var(--ink); border: 1px solid var(--panel2);
    border-radius: 4px; padding: 1px 5px; font-family: 'Courier New', monospace; font-size: 11px;
  }
  /* Mobile virtual controls */
  #mobile-pad { display: none; }
  body.mobile #mobile-pad {
    display: grid; position: fixed; bottom: 18px; left: 18px;
    grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 4px;
    z-index: 20; touch-action: none;
  }
  body.mobile #mobile-bomb {
    display: flex; position: fixed; bottom: 38px; right: 24px;
    width: 92px; height: 92px; border-radius: 50%;
    align-items: center; justify-content: center;
    background: radial-gradient(circle, var(--accent) 0%, var(--panel) 80%);
    border: 1px solid var(--accent); color: var(--ink); font-weight: 700;
    letter-spacing: 2px; font-size: 13px; z-index: 20;
    box-shadow: 0 0 18px rgba(182,164,220,.35); touch-action: none;
  }
  #mobile-bomb { display: none; }
  .pad-btn {
    background: rgba(26,21,48,.8); border: 1px solid var(--panel2);
    border-radius: 8px; color: var(--fg); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .pad-btn.active { background: var(--accent); color: var(--ink); }
  .pad-empty { visibility: hidden; }
</style>
</head>
<body>

<button id="audio-toggle" title="audio" aria-label="toggle audio">♪</button>
<button id="fs-toggle" title="fullscreen" aria-label="toggle fullscreen">⛶</button>

<div id="lobby">
  <h1>PLAYING WITH GOOL<span class="accent">Z</span></h1>
  <p class="tag">four wisps · one lantern drifts home</p>

  <div id="lobby-name" class="row">
    <input type="text" name="name" placeholder="your name" maxlength="16" autocomplete="off">
    <button id="btn-color" title="cycle wisp color">color</button>
  </div>

  <div id="lobby-actions" class="row">
    <button id="btn-create">CREATE ROOM</button>
    <span style="align-self:center;opacity:.5">or</span>
    <input type="text" name="code" placeholder="ROOM CODE" maxlength="6" autocomplete="off">
    <button id="btn-join" class="alt">JOIN</button>
  </div>

  <div id="lobby-actions2" class="row">
    <button id="btn-solo" class="alt" title="play offline against AI">PLAY SOLO</button>
  </div>

  <div id="lobby-room" style="display:none">
    <div class="hint">share this code:</div>
    <div class="roomcode" id="roomcode" title="click to copy">------</div>
    <div class="row" style="margin:4px 0">
      <button id="btn-copylink" class="alt" style="padding:6px 14px;font-size:11px">COPY LINK</button>
      <select id="ai-difficulty" style="font:inherit;background:var(--ink);color:var(--fg);border:1px solid var(--panel2);border-radius:6px;padding:6px 10px">
        <option value="0">wisp · easy</option>
        <option value="1" selected>wraith · normal</option>
        <option value="2">banshee · hard</option>
      </select>
      <button id="btn-add-ai" class="alt" style="padding:6px 14px;font-size:11px">+ ADD GHOST</button>
    </div>
    <div class="hint" id="copyhint">click code to copy</div>
    <div class="roster" id="roster"></div>
    <div class="specrow" id="specrow">
      <span class="label">SPECTATORS</span>
      <span id="speclist" style="margin-left:8px;opacity:.55">— none —</span>
    </div>
    <div class="row">
      <button id="btn-start">START</button>
      <button id="btn-leave" class="alt">LEAVE</button>
    </div>
    <div class="hint" id="hostHint">waiting for host…</div>
  </div>

  <div id="status" role="status" aria-live="polite"></div>
  <div class="controls-help">
    <kbd>WASD</kbd> / <kbd>↑↓←→</kbd> drift &nbsp;·&nbsp; <kbd>Space</kbd> / <kbd>K</kbd> place candle
  </div>
</div>

<div id="game">
  <div id="hud"></div>
  <canvas id="cv" width="480" height="352" aria-label="game"></canvas>
  <div class="controls-help">
    <kbd>WASD</kbd> drift &nbsp;·&nbsp; <kbd>Space</kbd> candle &nbsp;·&nbsp;
    <span style="color:var(--accent)">●</span> +candle &nbsp;
    <span style="color:var(--accent2)">●</span> +hex &nbsp;
    <span style="color:#e6c890">●</span> +drift
  </div>
</div>

<div id="mobile-pad" aria-hidden="true">
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="up">▲</div>
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="left">◀</div>
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="right">▶</div>
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="down">▼</div>
  <div class="pad-empty"></div>
</div>
<button id="mobile-bomb" aria-label="place candle">CANDLE</button>

<div id="overlay"><div class="card">
  <h2 id="overTitle">·  ·  ·</h2>
  <div id="overSub" style="margin-bottom:18px;opacity:.85;font-style:italic"></div>
  <button id="btn-rematch">REMATCH</button>
  <button id="btn-back" class="alt">LOBBY</button>
</div></div>

<script>
'use strict';

// ───────────────────────────────────────────────────────────────────────
// Constants & state
// ───────────────────────────────────────────────────────────────────────
const W = 15, H = 11, TILE = 32;
const T_EMPTY = 0, T_WALL = 1, T_BARREL = 2;
const PU_BOMB = 0, PU_POWER = 1, PU_SPEED = 2;
const PU_NAMES = ['candle','hex','drift'];

// Four wisps: faint violet, sage, candleglow, bone.
const COLORS  = ['#b6a4dc','#a8c89c','#e6c890','#dcd7c2'];
const COLOR_NAMES = ['violet','sage','candle','bone'];
const SPAWNS = [[1,1],[W-2,1],[1,H-2],[W-2,H-2]];

const BOMB_FUSE = 2.4;          // seconds
const FIRE_TIME = 0.55;
const POWERUP_CHANCE = 0.34;    // per barrel
const BASE_SPEED = 4.6;         // tiles/s
const SPEED_STEP = 0.85;        // tiles/s per powerup
const MAX_POWER = 9;
const MAX_BOMBS = 9;
const MAX_SPEED_TIER = 5;

let tiles, barrelLoot, powerups, players, bombs, fires;
let me = { id: null, name: 'player', color: 0, slot: -1, host: false };
let ws = null;
let scene = 'lobby';     // 'lobby' | 'game' | 'spectate'
let started = false;     // server-side game-in-progress flag
let endResult = null;    // {kind, winner?}
let lastNetSend = 0;
const peers = new Map(); // id -> {name, color, slot}
function isSpectating() { return scene === 'game' && me.slot < 0; }

// ───────────────────────────────────────────────────────────────────────
// Deterministic RNG (xmur3 + mulberry32)
// ───────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  let a = seed >>> 0;
  return function() {
    a = (a + 0x6d2b79f5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ───────────────────────────────────────────────────────────────────────
// Map generation (deterministic per seed)
// ───────────────────────────────────────────────────────────────────────
function generateMap(seed) {
  const rng = mulberry32(seed);
  tiles = new Uint8Array(W * H);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const isBorder = x === 0 || y === 0 || x === W - 1 || y === H - 1;
      const isPillar = (x % 2 === 0) && (y % 2 === 0);
      tiles[y * W + x] = (isBorder || isPillar) ? T_WALL : T_EMPTY;
    }
  }
  // Spawn safe zones (3x3 around each spawn corner)
  const safe = new Set();
  for (const [sx, sy] of SPAWNS) {
    for (let dy = 0; dy <= 2; dy++) {
      for (let dx = 0; dx <= 2; dx++) {
        const x = sx + (sx === 1 ? dx : -dx);
        const y = sy + (sy === 1 ? dy : -dy);
        if (x >= 0 && x < W && y >= 0 && y < H) safe.add(y * W + x);
      }
    }
  }
  // Place barrels in remaining empty tiles
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (tiles[i] !== T_EMPTY) continue;
      if (safe.has(i)) continue;
      if (rng() < 0.82) tiles[i] = T_BARREL;
    }
  }
  // Pre-decide hidden powerups under barrels (kind or -1)
  barrelLoot = new Int8Array(W * H);
  barrelLoot.fill(-1);
  for (let i = 0; i < W * H; i++) {
    if (tiles[i] !== T_BARREL) continue;
    if (rng() < POWERUP_CHANCE) {
      const r = rng();
      barrelLoot[i] = r < 0.42 ? PU_BOMB : r < 0.78 ? PU_POWER : PU_SPEED;
    }
  }
}

// ───────────────────────────────────────────────────────────────────────
// Game state initialisation
// ───────────────────────────────────────────────────────────────────────
function initGame(seed, roster) {
  generateMap(seed);
  powerups = []; bombs = []; fires = [];
  players = {};
  endResult = null;

  // Build players from roster (only those with a slot)
  for (const r of roster) {
    if (r.slot < 0 || r.slot > 3) continue;
    const [sx, sy] = SPAWNS[r.slot];
    players[r.id] = {
      id: r.id, name: r.name, color: r.color, slot: r.slot,
      x: sx * TILE + TILE / 2, y: sy * TILE + TILE / 2,
      vx: 0, vy: 0, dir: 1,
      bombs: 1, power: 2, speedTier: 0,
      bombsActive: 0, alive: true,
      tx: sx * TILE + TILE / 2, ty: sy * TILE + TILE / 2,
    };
  }
  scene = 'game';
  started = true;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('overlay').style.display = 'none';
  // spectator banner
  let banner = document.getElementById('spec-banner');
  if (isSpectating()) {
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'spec-banner';
      banner.style.cssText = 'background:var(--accent);color:#fff;padding:6px 16px;border-radius:6px;font-weight:700;letter-spacing:2px;font-size:12px;';
      banner.textContent = '👁  SPECTATING — wait for next round to claim a seat';
      document.getElementById('game').prepend(banner);
    }
    banner.style.display = '';
  } else if (banner) {
    banner.style.display = 'none';
  }
  rebuildHud();
}

function localPlayer() { return players[me.id]; }

// ───────────────────────────────────────────────────────────────────────
// Tile / collision helpers
// ───────────────────────────────────────────────────────────────────────
function tileAt(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= W || ty >= H) return T_WALL;
  return tiles[ty * W + tx];
}
function bombAt(tx, ty) {
  for (const b of bombs) if (b.tx === tx && b.ty === ty) return b;
  return null;
}
function powerupAt(tx, ty) {
  for (const p of powerups) if (p.tx === tx && p.ty === ty) return p;
  return null;
}
function isSolid(tx, ty, ignoreBomb) {
  const t = tileAt(tx, ty);
  if (t === T_WALL || t === T_BARREL) return true;
  const b = bombAt(tx, ty);
  if (b && b !== ignoreBomb) return true;
  return false;
}

// ───────────────────────────────────────────────────────────────────────
// Local player input + simulation
// ───────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', (e) => {
  if (scene !== 'game') return;
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === ' ' || k === 'k') {
    e.preventDefault();
    tryDropBomb();
  }
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });

function inputVec() {
  let ix = 0, iy = 0;
  if (keys['w'] || keys['arrowup']) iy -= 1;
  if (keys['s'] || keys['arrowdown']) iy += 1;
  if (keys['a'] || keys['arrowleft']) ix -= 1;
  if (keys['d'] || keys['arrowright']) ix += 1;
  return [ix, iy];
}

// Attempt grid-aligned movement with classic Bomberman "corridor nudge"
function moveLocal(p, dt) {
  const [ix, iy] = inputVec();
  const speed = (BASE_SPEED + p.speedTier * SPEED_STEP) * TILE;
  // Determine intended direction: prefer non-zero axis. Diagonal: pick whichever has corridor.
  let dx = 0, dy = 0;
  if (ix !== 0 && iy === 0) dx = ix;
  else if (iy !== 0 && ix === 0) dy = iy;
  else if (ix !== 0 && iy !== 0) {
    // diagonal — prefer horizontal if blocked vertically and vice versa
    const ahead = (a, b) => !isSolid(Math.floor(p.x / TILE) + a, Math.floor(p.y / TILE) + b);
    const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
    if (ahead(ix, 0) && !ahead(0, iy)) dx = ix;
    else if (ahead(0, iy) && !ahead(ix, 0)) dy = iy;
    else dx = ix; // arbitrary
  }
  if (dx === 0 && dy === 0) { p.vx = p.vy = 0; return; }

  // axis position (along) and cross axis
  let along, cross, tilesAlong;
  if (dx !== 0) {
    along = p.x; cross = p.y; tilesAlong = dx;
    p.dir = dx > 0 ? 1 : 3;
  } else {
    along = p.y; cross = p.x; tilesAlong = dy;
    p.dir = dy > 0 ? 2 : 0;
  }

  // Try to move along axis. If blocked by tile in front, try nudging cross to align with corridor.
  const wantStep = speed * dt * tilesAlong;
  const tileX = Math.floor(p.x / TILE), tileY = Math.floor(p.y / TILE);
  const aheadX = tileX + (dx !== 0 ? tilesAlong : 0);
  const aheadY = tileY + (dy !== 0 ? tilesAlong : 0);
  const ignoreBomb = bombAt(tileX, tileY); // allow walking off bomb you just placed

  // Cross-axis snap toward tile center if there's a corridor
  const crossTileCenter = (Math.floor(cross / TILE) + 0.5) * TILE;
  const crossOff = cross - crossTileCenter;
  const snapAmt = Math.min(Math.abs(crossOff), speed * dt * 0.85);
  let canStep = !isSolid(aheadX, aheadY, ignoreBomb);

  // If straight blocked, see if a nudge unlocks it
  if (!canStep) {
    if (Math.abs(crossOff) > 1) {
      // try the next tile in the direction we're closer to
      const nudgeDir = -Math.sign(crossOff); // toward center
      const nudgeAheadX = dx !== 0 ? aheadX : aheadX + nudgeDir;
      const nudgeAheadY = dx !== 0 ? aheadY + nudgeDir : aheadY;
      if (!isSolid(nudgeAheadX, nudgeAheadY, ignoreBomb)) {
        // move purely in cross direction this frame
        if (dx !== 0) p.y -= Math.sign(crossOff) * snapAmt;
        else p.x -= Math.sign(crossOff) * snapAmt;
        p.vx = dx !== 0 ? 0 : -Math.sign(crossOff) * speed;
        p.vy = dx !== 0 ? -Math.sign(crossOff) * speed : 0;
        return;
      }
    }
    p.vx = p.vy = 0;
    return;
  }

  // Center along cross axis as we walk
  if (Math.abs(crossOff) > 0.1) {
    if (dx !== 0) p.y -= Math.sign(crossOff) * snapAmt;
    else p.x -= Math.sign(crossOff) * snapAmt;
  }

  // Apply along step but clamp to not enter the next tile if it's solid (next-next check)
  if (dx !== 0) {
    const newX = p.x + wantStep;
    // Don't allow center to cross into solid tile
    const targetTile = Math.floor((newX + Math.sign(wantStep) * TILE * 0.49) / TILE);
    if (!isSolid(targetTile, tileY, ignoreBomb)) {
      p.x = newX;
    } else {
      // clamp to current tile's edge
      const edge = (tileX + (wantStep > 0 ? 0.999 : 0.001)) * TILE - Math.sign(wantStep) * TILE * 0.49;
      p.x = wantStep > 0 ? Math.min(newX, edge) : Math.max(newX, edge);
    }
    p.vx = wantStep > 0 ? speed : -speed; p.vy = 0;
  } else {
    const newY = p.y + wantStep;
    const targetTile = Math.floor((newY + Math.sign(wantStep) * TILE * 0.49) / TILE);
    if (!isSolid(tileX, targetTile, ignoreBomb)) {
      p.y = newY;
    } else {
      const edge = (tileY + (wantStep > 0 ? 0.999 : 0.001)) * TILE - Math.sign(wantStep) * TILE * 0.49;
      p.y = wantStep > 0 ? Math.min(newY, edge) : Math.max(newY, edge);
    }
    p.vy = wantStep > 0 ? speed : -speed; p.vx = 0;
  }
}

// ───────────────────────────────────────────────────────────────────────
// Bombs
// ───────────────────────────────────────────────────────────────────────
function tryDropBomb() {
  const p = localPlayer();
  if (!p || !p.alive || endResult) return;
  if (p.bombsActive >= p.bombs) return;
  const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
  if (bombAt(tx, ty)) return;
  if (tileAt(tx, ty) !== T_EMPTY) return;
  spawnBomb(p.id, tx, ty, p.power, performance.now() / 1000);
  netSend({ t: 'bomb', tx, ty, power: p.power, t0: Date.now() });
}

function spawnBomb(ownerId, tx, ty, power, localT) {
  const b = { ownerId, tx, ty, power, fuseUntil: localT + BOMB_FUSE };
  bombs.push(b);
  const owner = players[ownerId];
  if (owner) owner.bombsActive++;
}

function explodeBomb(b) {
  // Remove from list
  const idx = bombs.indexOf(b);
  if (idx === -1) return;
  bombs.splice(idx, 1);
  const owner = players[b.ownerId];
  if (owner) owner.bombsActive = Math.max(0, owner.bombsActive - 1);

  // Track the tiles burned by THIS explosion so the bomb owner can
  // authoritatively claim kills below (independent of any other bombs
  // currently in the global `fires` array).
  const burned = [];
  const burn = (x, y) => { addFire(x, y); burned.push([x, y]); };

  // Center always burns
  burn(b.tx, b.ty);
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    for (let i = 1; i <= b.power; i++) {
      const x = b.tx + dx * i, y = b.ty + dy * i;
      const t = tileAt(x, y);
      if (t === T_WALL) break;
      if (t === T_BARREL) {
        // destroy barrel, drop loot if any
        tiles[y * W + x] = T_EMPTY;
        const loot = barrelLoot[y * W + x];
        if (loot >= 0) powerups.push({ tx: x, ty: y, kind: loot });
        burn(x, y);
        break;
      }
      burn(x, y);
      // chain reaction
      const chainBomb = bombAt(x, y);
      if (chainBomb) {
        chainBomb.fuseUntil = 0; // detonate next tick
      }
      // burn over powerup destroys it
      const pu = powerupAt(x, y);
      if (pu) powerups.splice(powerups.indexOf(pu), 1);
    }
  }

  // ── Owner-authoritative kill detection ────────────────────────────────
  // The original peer model trusted each player's own client to detect
  // death and broadcast it. That broke under network latency: the bomb
  // explodes at slightly different times on each peer (each peer starts
  // its fuse timer from when the bomb message arrived locally). A victim
  // could walk off the tile before their own client registers the fire,
  // so kills were missed and rounds never ended.
  //
  // Fix: when MY bomb explodes, I scan all players against THIS bomb's
  // fire pattern using their best-known position and broadcast a `kill`
  // claim for each hit. All peers (including the victim) honor it
  // immediately, so death animations + the win screen propagate in
  // realtime regardless of fuse-timing desync. Self-death (line 600
  // below) still fires as a redundant path.
  if (b.ownerId === me.id && burned.length) {
    let anyKilled = false;
    for (const id in players) {
      const p = players[id];
      if (!p.alive) continue;
      const ptx = Math.floor(p.x / TILE), pty = Math.floor(p.y / TILE);
      const hit = burned.some(([fx, fy]) => fx === ptx && fy === pty);
      if (!hit) continue;
      p.alive = false;
      anyKilled = true;
      if (id === me.id) {
        // I blew myself up — broadcast as a regular death.
        netSend({ t: 'death' });
      } else {
        netSend({ t: 'kill', target: id });
      }
    }
    if (anyKilled) {
      rebuildHud();
      checkEnd();
    }
  }
}

function addFire(tx, ty) {
  fires.push({ tx, ty, until: performance.now() / 1000 + FIRE_TIME });
}

// ───────────────────────────────────────────────────────────────────────
// Game loop
// ───────────────────────────────────────────────────────────────────────
let lastFrame = 0;
function frame(ts) {
  const t = ts / 1000;
  const dt = lastFrame ? Math.min(0.05, t - lastFrame) : 0;
  lastFrame = t;

  if (scene === 'game') {
    update(dt, t);
    render();
  }
  requestAnimationFrame(frame);
}

function update(dt, t) {
  // Local player movement & input
  const me_p = localPlayer();
  if (me_p && me_p.alive && !endResult) {
    moveLocal(me_p, dt);
  }
  // Smooth remote players toward target pos
  for (const id in players) {
    if (id === me.id) continue;
    const p = players[id];
    p.x += (p.tx - p.x) * Math.min(1, dt * 12);
    p.y += (p.ty - p.y) * Math.min(1, dt * 12);
  }

  // Detonate fused bombs
  const now = performance.now() / 1000;
  for (let i = bombs.length - 1; i >= 0; i--) {
    if (bombs[i].fuseUntil <= now) explodeBomb(bombs[i]);
  }
  // Expire fires
  for (let i = fires.length - 1; i >= 0; i--) {
    if (fires[i].until <= now) fires.splice(i, 1);
  }

  // Pickups
  if (me_p && me_p.alive) {
    const tx = Math.floor(me_p.x / TILE), ty = Math.floor(me_p.y / TILE);
    const pu = powerupAt(tx, ty);
    if (pu) {
      applyPowerup(me_p, pu.kind);
      powerups.splice(powerups.indexOf(pu), 1);
      netSend({ t: 'pickup', tx, ty, kind: pu.kind });
      rebuildHud();
    }
  }

  // Death check (any alive player on a fire tile)
  for (const id in players) {
    const p = players[id];
    if (!p.alive) continue;
    const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
    if (fires.some(f => f.tx === tx && f.ty === ty)) {
      if (id === me.id) {
        p.alive = false;
        netSend({ t: 'death' });
        rebuildHud();
        checkEnd();
      }
      // remote player: wait for their own death broadcast (avoid double-counting)
    }
  }

  // Network heartbeat: send pos at ~18Hz
  if (me_p && (t - lastNetSend) > (1 / 18)) {
    lastNetSend = t;
    netSend({ t: 'pos', x: Math.round(me_p.x), y: Math.round(me_p.y), dir: me_p.dir, alive: me_p.alive ? 1 : 0 });
  }
}

function applyPowerup(p, kind) {
  if (kind === PU_BOMB) p.bombs = Math.min(MAX_BOMBS, p.bombs + 1);
  else if (kind === PU_POWER) p.power = Math.min(MAX_POWER, p.power + 1);
  else if (kind === PU_SPEED) p.speedTier = Math.min(MAX_SPEED_TIER, p.speedTier + 1);
}

function checkEnd() {
  if (endResult) return;
  const alive = Object.values(players).filter(p => p.alive);
  if (alive.length === 1 && Object.keys(players).length > 1) {
    endResult = { kind: 'winner', winnerId: alive[0].id };
    showOverlay();
  } else if (alive.length === 0) {
    endResult = { kind: 'draw' };
    showOverlay();
  }
}

// ───────────────────────────────────────────────────────────────────────
// Rendering
// ───────────────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function render() {
  // base floor (slightly desaturated midnight)
  ctx.fillStyle = '#0e0a18';
  ctx.fillRect(0, 0, cv.width, cv.height);

  // tile pass
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      drawTile(x, y, tiles[y * W + x]);
    }
  }
  // powerups
  for (const p of powerups) drawPowerup(p);
  // bombs
  const now = performance.now() / 1000;
  for (const b of bombs) drawBomb(b, now);
  // players (sorted by y for depth)
  const ord = Object.values(players).sort((a, b) => a.y - b.y);
  for (const p of ord) drawPlayer(p, now);
  // fires (drawn over players for impact)
  for (const f of fires) drawFire(f, now);
  // particles (drift sparks on death/explosion)
  for (let i = particles.length - 1; i >= 0; i--) drawParticle(particles[i], now);
  // soft fog overlay (very subtle)
  drawFog(now);
}

// Floor tone is a quiet checker of haunt-purple over midnight.
function drawTile(x, y, kind) {
  const px = x * TILE, py = y * TILE;
  const odd = (x + y) & 1;
  ctx.fillStyle = odd ? '#14102a' : '#100c20';
  ctx.fillRect(px, py, TILE, TILE);

  if (kind === T_WALL) {
    // tower stone: a quiet old block with a single mossy highlight.
    ctx.fillStyle = '#2a2542';
    ctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
    ctx.fillStyle = '#3a3358';
    ctx.fillRect(px + 2, py + 2, TILE - 4, 3);
    ctx.fillRect(px + 2, py + 2, 3, TILE - 4);
    ctx.fillStyle = '#181429';
    ctx.fillRect(px + 2, py + TILE - 5, TILE - 4, 3);
    ctx.fillRect(px + TILE - 5, py + 2, 3, TILE - 4);
    // moss fleck (deterministic-ish per tile)
    if (((x * 7 + y * 13) & 7) === 0) {
      ctx.fillStyle = 'rgba(185,211,164,.35)';
      ctx.fillRect(px + 6, py + 6, 2, 2);
    }
  } else if (kind === T_BARREL) {
    // gravestone marker (rounded top, faint inscription line).
    ctx.fillStyle = '#1d1838';
    ctx.fillRect(px + 4, py + 6, TILE - 8, TILE - 8);
    ctx.fillStyle = '#2c2548';
    ctx.fillRect(px + 5, py + 7, TILE - 10, TILE - 12);
    // rounded shoulders
    ctx.fillStyle = '#2c2548';
    ctx.fillRect(px + 6, py + 4, TILE - 12, 3);
    ctx.fillStyle = '#1d1838';
    ctx.fillRect(px + 5, py + 5, 1, 2);
    ctx.fillRect(px + TILE - 6, py + 5, 1, 2);
    // top bevel
    ctx.fillStyle = '#3d3458';
    ctx.fillRect(px + 7, py + 5, TILE - 14, 1);
    // inscription line
    ctx.fillStyle = 'rgba(185,211,164,.18)';
    ctx.fillRect(px + 8, py + 14, TILE - 16, 1);
    ctx.fillRect(px + 9, py + 18, TILE - 18, 1);
    // shadow at base
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillRect(px + 4, py + TILE - 4, TILE - 8, 2);
  }
}

// Soft fog: a barely-there moving gradient. Cheap, low alpha.
let _fogPhase = Math.random() * 1000;
function drawFog(now) {
  if (prefersReducedMotion) return;
  const w = cv.width, h = cv.height;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.04;
  const cx = w * 0.5 + Math.sin(now * 0.1 + _fogPhase) * 60;
  const cy = h * 0.55 + Math.cos(now * 0.08) * 40;
  const g = ctx.createRadialGradient(cx, cy, 20, cx, cy, w * 0.7);
  g.addColorStop(0, '#b6a4dc');
  g.addColorStop(1, 'rgba(182,164,220,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

const prefersReducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

// Particle pool — short-lived drift sparks.
const particles = [];
function emitParticles(px, py, color, count) {
  if (prefersReducedMotion) count = Math.min(count, 4);
  const t = performance.now() / 1000;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: px, y: py,
      vx: (Math.random() - 0.5) * 40,
      vy: -10 - Math.random() * 30,
      life: t + 0.6 + Math.random() * 0.4,
      born: t,
      color,
    });
  }
}
function drawParticle(p, now) {
  const lifeT = (p.life - now);
  if (lifeT <= 0) { particles.splice(particles.indexOf(p), 1); return; }
  const dt = now - p.born;
  const x = p.x + p.vx * dt;
  const y = p.y + p.vy * dt + dt * dt * 30;
  const a = Math.max(0, lifeT);
  ctx.fillStyle = p.color;
  ctx.globalAlpha = a;
  ctx.fillRect(x | 0, y | 0, 2, 2);
  ctx.globalAlpha = 1;
}

// "Bombs" are candles. A short pillar with a flickering flame and a faint glow.
function drawBomb(b, now) {
  const px = b.tx * TILE + TILE / 2;
  const py = b.ty * TILE + TILE / 2;
  const remaining = Math.max(0, b.fuseUntil - now);
  const phase = BOMB_FUSE - remaining;
  const pulse = 0.5 + 0.5 * Math.sin(phase * (10 + phase * 6));
  // soft glow (warm)
  const glow = ctx.createRadialGradient(px, py - 2, 1, px, py - 2, TILE * 0.6);
  glow.addColorStop(0, `rgba(230,200,144,${0.18 + pulse * 0.18})`);
  glow.addColorStop(1, 'rgba(230,200,144,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(px - TILE * 0.6, py - TILE * 0.6, TILE * 1.2, TILE * 1.2);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(px, py + 7, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  // candle pillar (bone-pale)
  ctx.fillStyle = '#dcd2b6';
  ctx.fillRect(px - 4, py - 3, 8, 9);
  ctx.fillStyle = '#9a8e74';
  ctx.fillRect(px - 4, py + 4, 8, 2);
  // wax drip
  ctx.fillStyle = '#c8bda0';
  ctx.fillRect(px + 2, py - 1, 1, 4);
  // wick
  ctx.fillStyle = '#1a1530';
  ctx.fillRect(px - 1, py - 6, 2, 3);
  // flame (teardrop, sage-tinted, flickers warm at end of fuse)
  const flameH = 6 + pulse * 3;
  const warm = phase / BOMB_FUSE;
  // outer flame
  ctx.fillStyle = `rgba(${Math.round(185 + warm * 60)},${Math.round(211 - warm * 30)},${Math.round(164 - warm * 60)},.85)`;
  ctx.beginPath();
  ctx.ellipse(px, py - 6 - flameH * 0.4, 2.4, flameH * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // hot core
  ctx.fillStyle = '#fff4d0';
  ctx.fillRect(px - 1, py - 7, 2, 3);
}

// Player is a wisp: a soft glowing droplet with two pinpoint eyes.
// Tinted by player color. Idle gentle bob, brighter glow when moving.
function drawPlayer(p, now) {
  const px = p.x, py = p.y;
  const col = COLORS[p.color] || '#dcd7c2';
  // ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(px, py + 9, 7, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  if (!p.alive) {
    // dispersed wisp — much fainter, drifting up
    const fade = 0.3;
    ctx.globalAlpha = fade;
    ctx.fillStyle = col;
    const driftY = Math.sin(now * 1.3 + p.slot) * 3;
    ctx.beginPath(); ctx.ellipse(px, py - 4 + driftY, 7, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    return;
  }

  // idle gentle float, small extra bob when moving
  const moving = Math.abs(p.vx) + Math.abs(p.vy) > 1;
  const float = Math.sin(now * 2.4 + p.slot * 1.7) * 1.4;
  const bob = moving ? Math.sin(now * 12) * 0.8 : 0;
  const yy = py + float + bob;

  // outer glow (soft halo)
  const halo = ctx.createRadialGradient(px, yy - 4, 1, px, yy - 4, 14);
  halo.addColorStop(0, hexToRGBA(col, 0.45));
  halo.addColorStop(1, hexToRGBA(col, 0));
  ctx.fillStyle = halo;
  ctx.fillRect(px - 14, yy - 18, 28, 28);

  // body — rounded teardrop
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.ellipse(px, yy - 4, 7, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  // soft inner highlight
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.beginPath(); ctx.ellipse(px - 2, yy - 7, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();

  // wisp tail (small wavering tail beneath)
  ctx.fillStyle = hexToRGBA(col, 0.7);
  ctx.beginPath();
  ctx.moveTo(px - 4, yy + 4);
  ctx.quadraticCurveTo(px + Math.sin(now * 6) * 2, yy + 8, px + 4, yy + 4);
  ctx.lineTo(px + 2, yy + 2);
  ctx.lineTo(px - 2, yy + 2);
  ctx.closePath();
  ctx.fill();

  // eyes (face direction). Small ink dots.
  ctx.fillStyle = '#0a0712';
  let ex = 0, ey = -6;
  if (p.dir === 1) ex = 1;          // right
  else if (p.dir === 3) ex = -1;    // left
  else if (p.dir === 0) ey = -7;    // up
  else ey = -5;                     // down
  ctx.fillRect(px - 2 + ex, yy + ey, 1.5, 2);
  ctx.fillRect(px + 2 + ex, yy + ey, 1.5, 2);

  // small marker over the local player (down-pointing chevron in sage)
  if (p.id === me.id) {
    ctx.fillStyle = 'rgba(185,211,164,.85)';
    ctx.beginPath();
    ctx.moveTo(px, yy - 14);
    ctx.lineTo(px - 3, yy - 18);
    ctx.lineTo(px + 3, yy - 18);
    ctx.closePath();
    ctx.fill();
  }
}

function hexToRGBA(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// Powerups are floating votive motes — three flavors, three colors.
function drawPowerup(p) {
  const px = p.tx * TILE + TILE / 2, py = p.ty * TILE + TILE / 2;
  const t = performance.now() / 1000;
  const bob = Math.sin(t * 3 + p.tx + p.ty) * 2;
  const col = p.kind === PU_BOMB ? COLORS[0]      // violet — more candles
            : p.kind === PU_POWER ? COLORS[1]     // sage — longer hex
            : COLORS[2];                          // candle-gold — drift
  // glow halo
  const g = ctx.createRadialGradient(px, py + bob, 1, px, py + bob, TILE * 0.55);
  g.addColorStop(0, hexToRGBA(col, 0.45));
  g.addColorStop(1, hexToRGBA(col, 0));
  ctx.fillStyle = g;
  ctx.fillRect(px - TILE * 0.6, py + bob - TILE * 0.6, TILE * 1.2, TILE * 1.2);
  // mote orb
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(px, py + bob, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.arc(px - 1.5, py + bob - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();
  // tiny rune mark
  ctx.fillStyle = 'rgba(10,7,18,.65)';
  if (p.kind === PU_BOMB) { ctx.fillRect(px, py + bob - 1, 1, 3); ctx.fillRect(px - 1, py + bob, 3, 1); }
  else if (p.kind === PU_POWER) { ctx.fillRect(px - 2, py + bob, 5, 1); }
  else { ctx.fillRect(px - 2, py + bob - 1, 1, 1); ctx.fillRect(px, py + bob, 1, 1); ctx.fillRect(px + 2, py + bob + 1, 1, 1); }
}

// Blast is candle-fire: sage flame core, violet halo edge.
function drawFire(f, now) {
  const px = f.tx * TILE, py = f.ty * TILE;
  const tLeft = Math.max(0, f.until - now);
  const phase = 1 - tLeft / FIRE_TIME;
  const a = Math.sin(phase * Math.PI);
  const inset = Math.max(2, 8 - a * 7);
  // halo
  ctx.fillStyle = `rgba(182,164,220,${0.55 * a})`;
  ctx.fillRect(px + inset - 3, py + inset - 3, TILE - inset * 2 + 6, TILE - inset * 2 + 6);
  // mid (sage)
  ctx.fillStyle = `rgba(185,211,164,${0.85 * a})`;
  ctx.fillRect(px + inset, py + inset, TILE - inset * 2, TILE - inset * 2);
  // hot core (bone-pale)
  ctx.fillStyle = `rgba(255,250,220,${a})`;
  ctx.fillRect(px + inset + 4, py + inset + 4, TILE - inset * 2 - 8, TILE - inset * 2 - 8);
  // drifting embers
  if (!prefersReducedMotion) {
    for (let i = 0; i < 2; i++) {
      const r = (now * 13 + i * 2.7 + f.tx + f.ty) % 1;
      const sx = px + 4 + r * (TILE - 8);
      const sy = py + (TILE - 4) - phase * (TILE - 8);
      ctx.fillStyle = `rgba(230,200,144,${(1 - phase) * 0.9})`;
      ctx.fillRect(sx | 0, sy | 0, 2, 2);
    }
  }
}

function rebuildHud() {
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  const ord = Object.values(players).sort((a, b) => a.slot - b.slot);
  for (const p of ord) {
    const card = document.createElement('div');
    card.className = 'pcard' + (p.alive ? '' : ' dead') + (p.id === me.id ? ' me' : '');
    const sw = COLORS[p.color];
    card.innerHTML =
      `<div class="pswatch" style="background:${sw};color:${sw}"></div>` +
      `<div><div class="pname"><b>${escapeHtml(p.name)}</b></div>` +
      `<div class="stat">candle ${p.bombs} · hex ${p.power} · drift ${p.speedTier + 1}</div></div>`;
    hud.appendChild(card);
  }
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function showOverlay() {
  const over = document.getElementById('overlay');
  const titleEl = document.getElementById('overTitle');
  const subEl = document.getElementById('overSub');
  if (endResult.kind === 'winner') {

    titleEl.textContent = w.id === me.id ? 'YOU DRIFT HOME' : `${w.name.toUpperCase()} drifts home`;
    titleEl.style.color = COLORS[w.color];
    subEl.textContent = w.id === me.id ? 'the lantern is yours' : 'the others are vapor';
    sfxWin();
  } else {
    titleEl.textContent = 'all extinguished';
    titleEl.style.color = 'var(--fg)';
    subEl.textContent = 'no lantern remains';
  }
  over.style.display = 'flex';

  document.getElementById('btn-rematch').style.display = (me.host || soloMode) ? '' : 'none';
}

// ───────────────────────────────────────────────────────────────────────
// Networking
// ───────────────────────────────────────────────────────────────────────
let pendingRoom = null;

function netSend(obj) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify(obj));
}

function connect(roomCode) {
  return new Promise((resolve, reject) => {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const host = location.host || 'localhost:8787';
    const url = `${proto}://${host}/api/pwg/ws/${roomCode}`;
    ws = new WebSocket(url);
    let opened = false;
    ws.onopen = () => { opened = true; resolve(); };
    ws.onmessage = (ev) => onNetMessage(ev.data);
    ws.onclose = () => {
      if (!opened) reject(new Error('connection failed'));
      else handleDisconnect();
    };
    ws.onerror = () => { if (!opened) reject(new Error('connection error')); };
  });
}

function handleDisconnect() {
  setStatus('disconnected — refresh to reconnect');
}

function onNetMessage(data) {
  let m;
  try { m = JSON.parse(data); } catch { return; }

  if (m.t === 'welcome') {
    me.id = m.id;
    started = !!m.started;
    netSend({ t: 'join', name: me.name, color: me.color });
    return;
  }
  if (m.t === 'roster') {
    peers.clear();
    for (const r of m.list) peers.set(r.id, r);
    started = !!m.started;
    me.host = (m.hostId === me.id);
    // sync my own slot/color from server-side roster (server-authoritative)
    const myEntry = m.list.find(r => r.id === me.id);
    if (myEntry) { me.slot = myEntry.slot; me.color = myEntry.color; updateColorBtn(); }
    renderRoster(m.list, m.hostId);

    // Start button only visible when host AND seated AND ≥2 seated AND not started
    const seatedCount = m.list.filter(r => r.slot >= 0).length;
    const canStart = me.host && me.slot >= 0 && seatedCount >= 2 && !started;
    const btnStart = document.getElementById('btn-start');
    btnStart.style.display = (me.host && !started) ? '' : 'none';
    btnStart.disabled = !canStart;

    const hint = document.getElementById('hostHint');
    if (started) {
      hint.textContent = 'match in progress — waiting for next round…';
    } else if (me.slot < 0) {
      hint.textContent = me.host
        ? 'click SIT to take a seat — need ≥ 2 seated to start'
        : 'click SIT to take a seat (or spectate)';
    } else if (seatedCount < 2) {
      hint.textContent = 'need at least 2 seated to start';
    } else {
      hint.textContent = me.host ? 'you are host — start when ready' : 'waiting for host to start…';
    }
    return;
  }
  if (m.t === 'start') {
    initGame(m.seed, m.roster);
    return;
  }
  if (m.t === 'reset') {
    started = false;
    backToRoom();
    return;
  }
  if (m.t === 'leave') {
    const p = players && players[m.id];
    if (p && p.alive) {
      p.alive = false;
      checkEnd();
      rebuildHud();
    }
    return;
  }
  if (!players) return;

  // peer→peer messages: ignore our own echoes
  if (m.id === me.id) return;
  const p = players[m.id];
  if (!p) return;

  if (m.t === 'pos') {
    p.tx = m.x; p.ty = m.y; p.dir = m.dir;
    if (m.alive === 0 && p.alive) { p.alive = false; rebuildHud(); checkEnd(); }
  } else if (m.t === 'bomb') {
    spawnBomb(m.id, m.tx, m.ty, m.power, performance.now() / 1000);
  } else if (m.t === 'pickup') {
    const pu = powerupAt(m.tx, m.ty);
    if (pu) {
      applyPowerup(p, m.kind);
      powerups.splice(powerups.indexOf(pu), 1);
      rebuildHud();
    }
  } else if (m.t === 'death') {
    p.alive = false; rebuildHud(); checkEnd();
  } else if (m.t === 'kill') {
    // Bomb-owner authoritative kill claim: target may be any player.
    const target = players[m.target];
    if (target && target.alive) {
      target.alive = false;
      rebuildHud();
      checkEnd();
    }
  }
}

function renderRoster(list, hostId) {
  const slots = document.getElementById('roster');
  slots.innerHTML = '';
  const bySlot = {};
  for (const r of list) if (r.slot >= 0 && r.slot <= 3) bySlot[r.slot] = r;
  const canChange = !started; // only when no game in progress

  for (let i = 0; i < 4; i++) {
    const r = bySlot[i];
    const s = document.createElement('div');
    s.className = 'slot' + (r ? '' : ' empty');
    if (r && r.id === hostId) s.classList.add('host');
    if (r && r.id === me.id) s.classList.add('mine');

    if (r) {
      const isAi = !!r.ai;
      if (isAi) s.classList.add('ai');
      const sw = COLORS[r.color] || '#888';
      const hostMark = (r.id === hostId && !isAi) ? ' <span style="color:var(--accent2);font-size:11px">· host</span>' : '';
      const aiMark = isAi ? ' <span style="color:var(--accent);font-size:11px;font-style:italic">· ghost</span>' : '';
      s.innerHTML =
        `<div class="swatch" style="background:${sw};color:${sw}"></div>` +
        `<div style="flex:1"><div class="slotname">${escapeHtml(r.name)}${r.id === me.id ? ' (you)' : ''}${hostMark}${aiMark}</div>` +
        `<div class="slotinfo">seat ${i + 1} · ${COLOR_NAMES[r.color] || ''}</div></div>`;
      if (r.id === me.id && canChange) {
        const b = document.createElement('button');
        b.className = 'slotbtn unclaim'; b.textContent = 'STAND';
        b.onclick = () => netSend({ t: 'unclaim' });
        s.appendChild(b);
      }
    } else {
      s.innerHTML =
        `<div class="swatch"></div>` +
        `<div style="flex:1"><div class="slotname">empty seat ${i + 1}</div></div>`;
      if (canChange && me.slot < 0) {
        const b = document.createElement('button');
        b.className = 'slotbtn'; b.textContent = 'SIT';
        b.onclick = () => claimSeat(i);
        s.appendChild(b);
      } else if (canChange && me.slot === i) {
        // shouldn't happen — slot would be claimed
      }
    }
    slots.appendChild(s);
  }

  // spectators
  const specs = list.filter(r => r.slot < 0);
  const specDiv = document.getElementById('speclist');
  if (specs.length === 0) {
    specDiv.innerHTML = '<span style="opacity:.55">— none —</span>';
  } else {
    specDiv.innerHTML = specs.map(s =>
      `<span class="specchip${s.id === me.id ? ' me' : ''}">${escapeHtml(s.name)}${s.id === me.id ? ' (you)' : ''}${s.id === hostId ? ' · host' : ''}</span>`
    ).join('');
  }
}

function claimSeat(i) {
  netSend({ t: 'claim', slot: i, color: me.color });
}

// ───────────────────────────────────────────────────────────────────────
// Audio engine — Web Audio chiptune (Phrygian) + clean SFX. No files.
// ───────────────────────────────────────────────────────────────────────
const AudioEngine = (() => {
  let ac = null;
  let masterGain = null;
  let musicGain = null;
  let sfxGain = null;
  let muted = (localStorage.getItem('pwg_muted') === '1');
  let started = false;
  let musicTimer = null;
  let musicTempo = 1.0; // multiplier; ramps in sudden death
  // D Phrygian: D Eb F G A Bb C — four-bar progression with an austere bell line
  const N = (semis) => 220 * Math.pow(2, semis / 12);
  const D3 = N(-19), Eb3 = N(-18), F3 = N(-17), G3 = N(-16), A3 = N(-15), Bb3 = N(-14), C4 = N(-13);
  const D4 = N(-7), Eb4 = N(-6), F4 = N(-5), G4 = N(-4), A4 = N(-3), Bb4 = N(-2), C5 = N(-1);

  function ensure() {
    if (ac) return;
    try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; }
    masterGain = ac.createGain();
    masterGain.gain.value = muted ? 0 : 0.5;
    masterGain.connect(ac.destination);
    musicGain = ac.createGain();
    musicGain.gain.value = 0.18;
    musicGain.connect(masterGain);
    sfxGain = ac.createGain();
    sfxGain.gain.value = 0.6;
    sfxGain.connect(masterGain);
  }

  function tone(freq, dur, type, vol, attack, release, dest) {
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    o.type = type || 'square';
    o.frequency.value = freq;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + (attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur + (release || 0.05));
    o.connect(g);
    g.connect(dest || sfxGain);
    o.start(t);
    o.stop(t + dur + (release || 0.05) + 0.02);
  }

  function noiseBurst(dur, vol, lpFreq) {
    if (!ac) return;
    const t = ac.currentTime;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / ch.length);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = lpFreq || 1200;
    const g = ac.createGain();
    g.gain.value = vol;
    src.connect(lp); lp.connect(g); g.connect(sfxGain);
    src.start(t);
  }

  // ── A small five-bar Phrygian motif. Slightly mournful, never gaudy. ──
  // (degree, beats) — degree maps onto our scale [D, Eb, F, G, A, Bb, C, D']
  const SCALE = [D4, Eb4, F4, G4, A4, Bb4, C5, D4 * 2];
  const BASS  = [D3, Eb3, F3,  G3,  A3,  Bb3, C4,  D4];
  // Phrase pattern: ascending-descending sigh, returning to the tonic.
  const phrase = [
    [0,1],[2,1],[4,2],[3,1],[2,1],[1,2],[0,2],
    [0,1],[2,1],[5,2],[4,1],[3,1],[2,2],[0,4],
  ];
  const bassLine = [
    [0,4],[3,4],[1,4],[0,4],
  ];

  function startMusic() {
    if (!ac || musicTimer) return;
    let beatIx = 0;
    let bassIx = 0;
    const tickBeat = () => {
      if (!ac || muted || document.hidden) {
        musicTimer = setTimeout(tickBeat, 200);
        return;
      }
      const beatLen = 0.36 / musicTempo;
      const note = phrase[beatIx % phrase.length];
      const beats = note[1];
      const freq = SCALE[note[0]];
      // bell lead — triangle, gentle
      tone(freq, beatLen * beats * 0.7, 'triangle', 0.22, 0.01, beatLen * beats * 0.4, musicGain);
      // soft octave shimmer (very faint)
      tone(freq * 2, beatLen * beats * 0.3, 'sine', 0.06, 0.01, beatLen * beats * 0.3, musicGain);
      // bass on downbeats
      const cum = phrase.slice(0, beatIx % phrase.length + 1).reduce((s, n) => s + n[1], 0);
      if (cum % 4 === 0) {
        const b = bassLine[bassIx % bassLine.length];
        tone(BASS[b[0]], beatLen * 4 * 0.95, 'sawtooth', 0.10, 0.02, 0.4, musicGain);
        bassIx++;
      }
      beatIx++;
      musicTimer = setTimeout(tickBeat, beats * beatLen * 1000);
    };
    tickBeat();
  }

  function stopMusic() {
    if (musicTimer) clearTimeout(musicTimer);
    musicTimer = null;
  }

  function setMuted(v) {
    muted = !!v;
    localStorage.setItem('pwg_muted', muted ? '1' : '0');
    if (masterGain) masterGain.gain.value = muted ? 0 : 0.5;
  }

  function setTempo(t) { musicTempo = Math.max(0.6, Math.min(1.8, t)); }

  // SFX
  function start() {
    if (started) return;
    started = true;
    ensure();
    if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    startMusic();
  }
  function placeCandle() { ensure(); tone(440, 0.08, 'square', 0.25); tone(220, 0.05, 'square', 0.18); }
  function blast() {
    ensure();
    noiseBurst(0.32, 0.5, 1400);
    tone(110, 0.18, 'sawtooth', 0.18, 0.005, 0.18);
    tone(160, 0.1, 'square', 0.12, 0.005, 0.1);
  }
  function pickup() { ensure(); tone(660, 0.06, 'square', 0.25); tone(990, 0.08, 'triangle', 0.18, 0.005, 0.06); }
  function death() {
    ensure();
    tone(330, 0.18, 'sawtooth', 0.25, 0.005, 0.2);
    tone(165, 0.28, 'sawtooth', 0.18, 0.01, 0.3);
    noiseBurst(0.18, 0.18, 800);
  }
  function win() {
    ensure();
    [F4, A4, C5, F4 * 2].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.3, 0.01, 0.2), i * 130));
  }
  function tick() { ensure(); tone(880, 0.04, 'square', 0.18); }
  function deny() { ensure(); tone(150, 0.08, 'sawtooth', 0.2); }

  return { start, placeCandle, blast, pickup, death, win, tick, deny, setMuted, setTempo, isMuted: () => muted };
})();

function sfxPlace() { AudioEngine.placeCandle(); }
function sfxBlast() { AudioEngine.blast(); }
function sfxPickup() { AudioEngine.pickup(); }
function sfxDeath() { AudioEngine.death(); }
function sfxWin() { AudioEngine.win(); }

document.addEventListener('fullscreenchange', refreshFsBtn);
document.addEventListener('webkitfullscreenchange', refreshFsBtn);
// F key shortcut — but not when typing in an input
window.addEventListener('keydown', (e) => {
  if ((e.key === 'f' || e.key === 'F') &&
      e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' &&
      !e.metaKey && !e.ctrlKey && !e.altKey) {
    fsBtn.click();
    e.preventDefault();
  }
});
// First user gesture starts the engine (autoplay policies)
window.addEventListener('pointerdown', () => AudioEngine.start(), { once: true });
window.addEventListener('keydown', () => AudioEngine.start(), { once: true });

// Hook explosion + pickup + death so audio fires.
const _origExplode = explodeBomb;
explodeBomb = function(b) { sfxBlast(); _origExplode(b); };
const _origApply = applyPowerup;
applyPowerup = function(p, k) { _origApply(p, k); if (p && p.id === me.id) sfxPickup(); };

// Death sfx hook (local player only, on first transition to dead)
let _wasAlive = true;
function _audioFrame() {
  const p = localPlayer && localPlayer();
  const alive = !!(p && p.alive);
  if (_wasAlive && !alive && p) {
    sfxDeath();
    emitParticles(p.x, p.y, COLORS[p.color] || '#dcd7c2', 18);
  }
  _wasAlive = alive;
  requestAnimationFrame(_audioFrame);
}
requestAnimationFrame(_audioFrame);

// ───────────────────────────────────────────────────────────────────────
// Mobile virtual D-pad + candle button (pointer:coarse)
// ───────────────────────────────────────────────────────────────────────
const isCoarse = matchMedia('(pointer: coarse)').matches;
if (isCoarse) {
  document.body.classList.add('mobile');
  const map = { up: 'arrowup', down: 'arrowdown', left: 'arrowleft', right: 'arrowright' };
  document.querySelectorAll('#mobile-pad .pad-btn').forEach(btn => {
    const dir = btn.getAttribute('data-dir');
    const k = map[dir];
    const press = (e) => { e.preventDefault(); keys[k] = true; btn.classList.add('active'); };
    const release = (e) => { e.preventDefault(); keys[k] = false; btn.classList.remove('active'); };
    btn.addEventListener('pointerdown', press);
    btn.addEventListener('pointerup', release);
    btn.addEventListener('pointerleave', release);
    btn.addEventListener('pointercancel', release);
  });
  const bombBtn = document.getElementById('mobile-bomb');
  bombBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); if (scene === 'game') tryDropBomb(); });
}

// ───────────────────────────────────────────────────────────────────────
// SFX hook for placing a candle
// ───────────────────────────────────────────────────────────────────────
const _origDrop = tryDropBomb;
tryDropBomb = function() {
  const before = bombs.length;
  _origDrop();
  if (bombs.length > before) sfxPlace();
};

// ───────────────────────────────────────────────────────────────────────
// Solo mode — no server. Local AI controllers.
// ───────────────────────────────────────────────────────────────────────
let soloMode = false;
let aiBots = []; // [{id, slot, color, difficulty, ...controller state}]

document.getElementById('btn-solo').addEventListener('click', () => {
  me.name = (document.querySelector('input[name=name]').value.trim() || 'player');
  localStorage.setItem('pwg_name', me.name);
  startSolo();
});

function startSolo() {
  soloMode = true;
  me.id = 'me';
  me.host = true;
  me.slot = 0;
  // Build a roster: human in seat 0, three wraith-difficulty bots in 1/2/3.
  const diff = parseInt(document.getElementById('ai-difficulty')?.value || '1', 10) | 0;
  const roster = [
    { id: 'me', name: me.name, color: me.color, slot: 0 },
    { id: 'ai1', name: 'wraith·a', color: 1, slot: 1, ai: true, difficulty: diff },
    { id: 'ai2', name: 'wraith·b', color: 2, slot: 2, ai: true, difficulty: diff },
    { id: 'ai3', name: 'wraith·c', color: 3, slot: 3, ai: true, difficulty: diff },
  ];
  for (const r of roster) peers.set(r.id, r);
  aiBots = roster.filter(r => r.ai).map(r => ({ ...r, _think: 0, _intent: null }));
  const seed = (Math.random() * 0x7fffffff) | 0;
  initGame(seed, roster);
}

// In solo mode, drive the AI bots from the same loop. Stamp their actions
// the way the network would have stamped them.
const _origUpdate = update;
update = function(dt, t) {
  _origUpdate(dt, t);
  if (!soloMode || endResult) return;
  for (const bot of aiBots) {
    const p = players[bot.id];
    if (!p || !p.alive) continue;
    aiTick(p, bot, dt, t);
  }
};

// AI: pick a target tile each ~0.6s (depending on difficulty), avoid imminent
// fire, drop candles when adjacent to a gravestone OR an enemy.
function aiTick(p, bot, dt, t) {
  bot._think -= dt;
  if (bot._think <= 0) {
    bot._think = bot.difficulty === 0 ? 0.9 : bot.difficulty === 1 ? 0.55 : 0.32;
    bot._intent = aiPlanIntent(p, bot);
  }
  // Move toward the target tile center
  const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
  let want = bot._intent || { dir: 0 };
  // Always run from danger first
  if (aiInDanger(tx, ty)) {
    const flee = aiFleeDir(p);
    if (flee) want = flee;
  }
  // Apply movement (mirror moveLocal but with synthetic input)
  aiMove(p, want, dt, bot);
  // Maybe place a candle
  if (bot._intent?.bomb && p.bombsActive < p.bombs && tileAt(tx, ty) === T_EMPTY && !bombAt(tx, ty)) {
    if (!aiBombSelfTrap(p, tx, ty)) {
      spawnBomb(p.id, tx, ty, p.power, performance.now() / 1000);
      bot._intent.bomb = false;
    }
  }
}

function aiPlanIntent(p, bot) {
  const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
  // Find nearest gravestone OR enemy via simple BFS, prefer enemy at hard difficulty
  const targets = [];
  for (const id in players) {
    const e = players[id];
    if (!e.alive || e.id === p.id) continue;
    targets.push({ x: Math.floor(e.x / TILE), y: Math.floor(e.y / TILE), enemy: true });
  }
  // Add adjacent gravestones to push exploration
  for (let yy = 0; yy < H; yy++) for (let xx = 0; xx < W; xx++) {
    if (tiles[yy * W + xx] === T_BARREL) targets.push({ x: xx, y: yy, enemy: false });
  }
  if (targets.length === 0) return { dir: 0, bomb: false };
  const path = aiBFS(tx, ty, targets);
  if (!path) return { dir: 0, bomb: false };
  let dir = 0;
  if (path.length > 1) {
    const next = path[1];
    if (next.x > tx) dir = 1;
    else if (next.x < tx) dir = 3;
    else if (next.y > ty) dir = 2;
    else dir = 0;
  }
  // Bomb if next-to a gravestone or an enemy and we have a clear escape
  let shouldBomb = false;
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const t = tileAt(tx + dx, ty + dy);
    if (t === T_BARREL) shouldBomb = true;
    for (const tgt of targets) if (tgt.enemy && tgt.x === tx + dx && tgt.y === ty + dy) shouldBomb = true;
  }
  // wisp difficulty bombs less aggressively
  if (bot.difficulty === 0 && Math.random() < 0.5) shouldBomb = false;
  return { dir, bomb: shouldBomb };
}

function aiBFS(sx, sy, targets) {
  const visited = new Uint8Array(W * H);
  const parent = new Int32Array(W * H).fill(-1);
  const q = [sy * W + sx];
  visited[sy * W + sx] = 1;
  const isTarget = (x, y) => targets.some(t => t.x === x && t.y === y);
  while (q.length) {
    const i = q.shift();
    const x = i % W, y = (i / W) | 0;
    if (isTarget(x, y) && !(x === sx && y === sy)) {
      const out = [];
      let cur = i;
      while (cur !== -1) { out.push({ x: cur % W, y: (cur / W) | 0 }); cur = parent[cur]; }
      return out.reverse();
    }
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = x + dx, ny = y + dy;
      if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
      const ni = ny * W + nx;
      if (visited[ni]) continue;
      const t = tiles[ni];
      // BFS treats gravestones as walkable (so we can target them); blocking only WALL
      if (t === T_WALL) continue;
      visited[ni] = 1;
      parent[ni] = i;
      q.push(ni);
    }
  }
  return null;
}

function aiInDanger(tx, ty) {
  // Imminent: same row/col as a fused bomb within its power range, no wall between
  for (const b of bombs) {
    if (b.tx === tx && b.ty === ty) return true;
    if (b.tx === tx) {
      const lo = Math.min(b.ty, ty), hi = Math.max(b.ty, ty);
      if (hi - lo <= b.power) {
        let blocked = false;
        for (let y = lo + 1; y < hi; y++) if (tileAt(tx, y) === T_WALL) { blocked = true; break; }
        if (!blocked) return true;
      }
    }
    if (b.ty === ty) {
      const lo = Math.min(b.tx, tx), hi = Math.max(b.tx, tx);
      if (hi - lo <= b.power) {
        let blocked = false;
        for (let x = lo + 1; x < hi; x++) if (tileAt(x, ty) === T_WALL) { blocked = true; break; }
        if (!blocked) return true;
      }
    }
  }
  for (const f of fires) if (f.tx === tx && f.ty === ty) return true;
  return false;
}

function aiFleeDir(p) {
  const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
  const opts = [[1,0,1],[-1,0,3],[0,1,2],[0,-1,0]];
  for (const [dx, dy, d] of opts) {
    if (!isSolid(tx + dx, ty + dy) && !aiInDanger(tx + dx, ty + dy)) return { dir: d, bomb: false };
  }
  return null;
}

function aiBombSelfTrap(p, tx, ty) {
  // Synthetic: simulate a fake bomb at (tx,ty) and check if BFS escape exists in <fuse
  const fakeBombs = bombs.concat([{ ownerId: p.id, tx, ty, power: p.power, fuseUntil: 0 }]);
  // any neighbor reachable that isn't in danger?
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = tx + dx, ny = ty + dy;
    if (isSolid(nx, ny)) continue;
    let safe = true;
    for (const b of fakeBombs) {
      if (b.tx === nx && b.ty === ny) safe = false;
      if (b.tx === nx && Math.abs(b.ty - ny) <= b.power) safe = false;
      if (b.ty === ny && Math.abs(b.tx - nx) <= b.power) safe = false;
    }
    if (safe) return false;
  }
  return true; // trapped — don't drop
}

function aiMove(p, want, dt, bot) {
  const speed = (BASE_SPEED + p.speedTier * SPEED_STEP) * TILE;
  let dx = 0, dy = 0;
  if (want.dir === 0) dy = -1;
  else if (want.dir === 1) dx = 1;
  else if (want.dir === 2) dy = 1;
  else if (want.dir === 3) dx = -1;
  if (dx === 0 && dy === 0) { p.vx = p.vy = 0; return; }
  const tileX = Math.floor(p.x / TILE), tileY = Math.floor(p.y / TILE);
  const ahead = !isSolid(tileX + dx, tileY + dy);
  if (!ahead) { p.vx = p.vy = 0; return; }
  // snap cross axis
  if (dx !== 0) {
    const center = (Math.floor(p.y / TILE) + 0.5) * TILE;
    const off = p.y - center;
    if (Math.abs(off) > 0.5) p.y -= Math.sign(off) * Math.min(Math.abs(off), speed * dt * 0.85);
    p.x += dx * speed * dt;
    p.dir = dx > 0 ? 1 : 3;
    p.vx = dx * speed; p.vy = 0;
  } else {
    const center = (Math.floor(p.x / TILE) + 0.5) * TILE;
    const off = p.x - center;
    if (Math.abs(off) > 0.5) p.x -= Math.sign(off) * Math.min(Math.abs(off), speed * dt * 0.85);
    p.y += dy * speed * dt;
    p.dir = dy > 0 ? 2 : 0;
    p.vy = dy * speed; p.vx = 0;
  }
}

// In solo mode, the rematch button restarts with fresh seed & roster.
const _origRematch = document.getElementById('btn-rematch').onclick;
document.getElementById('btn-rematch').addEventListener('click', () => {
  if (!soloMode) return;
  startSolo();
});
const _origBack = document.getElementById('btn-back').onclick;
document.getElementById('btn-back').addEventListener('click', () => {
  if (soloMode) {
    soloMode = false;
    aiBots = [];
    peers.clear();
    showLobby();
  }
});

// Sudden-death tempo nudge: when fewer wisps remain or a death occurs,
// the chiptune speeds up gently. Hooked into checkEnd via wrapper.
const _origCheckEnd = checkEnd;
checkEnd = function() {
  _origCheckEnd();
  const alive = players ? Object.values(players).filter(p => p.alive).length : 0;
  if (alive <= 2) AudioEngine.setTempo(1.25);
  else AudioEngine.setTempo(1.0);
};

// Pause music on tab hidden.
document.addEventListener('visibilitychange', () => {
  // Engine already gates on document.hidden in tickBeat.
});

// ───────────────────────────────────────────────────────────────────────
// Reconnect persistence (light): remember last room+name in sessionStorage.
// If the user reloads within 30s, the auto-join will reconnect.
// ───────────────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  if (pendingRoom) sessionStorage.setItem('pwg_last_room', pendingRoom);
});
const lastRoom = sessionStorage.getItem('pwg_last_room');
if (lastRoom && !autoCode && !soloMode) {
  // Don't auto-rejoin silently; surface a one-click hint.
  const hint = document.getElementById('status');
  if (hint) {
    hint.innerHTML = '';
    const a = document.createElement('a');
    a.href = `/games/pwg/?room=${lastRoom}`;
    a.textContent = `rejoin ${lastRoom}?`;
    a.style.cssText = 'color:var(--accent2);text-decoration:underline;cursor:pointer';
    hint.appendChild(a);
  }
}
