<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0c0a14">
<meta name="description" content="Playing With Goolz — a small four-wisp parlour game. Four lanterns enter, one drifts home.">
<meta property="og:title" content="Playing With Goolz">
<meta property="og:description" content="A small four-wisp parlour game. Four lanterns enter, one drifts home.">
<meta property="og:image" content="/games/pwg/og.png">
<meta property="og:type" content="website">
<title>Playing With Goolz</title>
<style>
  /* ───────────────────────────────────────────────────────────────
     GBA / 8-bit reskin — 4-color palette, hard pixels, no glow.
     Lavender Town inspired: deep haunt-purple, bone, candleflame,
     ghost-sage. No gradients, no border-radius, no blur, no
     box-shadow softness — just stamp-like 2px outlines.
     ─────────────────────────────────────────────────────────────── */
  :root {
    --bg:      #2a1840;   /* haunt purple background */
    --bg-dk:   #1a0e2a;   /* deep crypt (panels + ink) */
    --fg:      #f0e6d2;   /* bone foreground */
    --accent:  #c094ff;   /* candleflame violet */
    --accent2: #98d098;   /* ghost sage */
    --warn:    #e8a878;   /* embers */
    --muted:   #7a6a98;   /* faded shade */
    --line:    #f0e6d2;   /* the only outline color, period */
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--fg);
    /* Pixel-bitmap feel via tight monospace + crisp rendering. No web font
       (CSP would block it anyway), so we lean on the OS's fixed-width and
       turn off antialiasing for that GBA look. */
    font-family: 'Courier New', 'Lucida Console', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.3;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: geometricPrecision;
    image-rendering: pixelated;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    /* Subtle scanline pattern instead of a vignette. */
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
  }

  h1 {
    margin: 0; font-size: 22px; letter-spacing: 3px;
    color: var(--fg);
    font-weight: 700;
    text-transform: uppercase;
    /* Hard 1px shadow stack for that bitmap stamp feel. */
    text-shadow: 2px 2px 0 var(--bg-dk);
  }
  h1 .accent { color: var(--accent); text-shadow: 2px 2px 0 var(--bg-dk); }

  /* All buttons: a chunky rectangular cartridge button. */
  button {
    font: inherit; font-size: 11px;
    background: var(--bg-dk);
    color: var(--fg);
    border: 2px solid var(--line);
    border-radius: 0;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    /* Two-tone "pressed-into-cartridge" outline — no soft glow. */
    box-shadow: 2px 2px 0 0 var(--bg-dk);
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
  }
  button:hover { background: var(--accent); color: var(--bg-dk); }
  button:active { transform: translate(2px, 2px); box-shadow: 0 0 0 0 var(--bg-dk); }
  button.alt { border-color: var(--accent2); }
  button.alt:hover { background: var(--accent2); color: var(--bg-dk); }
  button:disabled { background: var(--bg-dk); color: var(--muted); border-color: var(--muted); cursor: not-allowed; }
  button:disabled:hover { background: var(--bg-dk); color: var(--muted); }

  input[type=text], select {
    font: inherit; font-size: 12px;
    padding: 6px 8px;
    border: 2px solid var(--line);
    border-radius: 0;
    background: var(--bg-dk);
    color: var(--fg);
    outline: none;
    min-width: 140px;
    text-transform: uppercase;
    letter-spacing: 2px;
    -webkit-font-smoothing: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  input[name=name] { text-transform: none; letter-spacing: 0; }

  /* ── LOBBY: a chunky bordered cartridge box ── */
  #lobby {
    background: var(--bg-dk);
    border: 3px solid var(--line);
    border-radius: 0;
    padding: 18px 22px 16px;
    width: min(540px, 94vw);
    text-align: center;
    /* Outer "drop shadow" rendered as a hard offset block — pure pixel. */
    box-shadow: 4px 4px 0 0 var(--accent);
  }
  #lobby p.tag {
    margin: 6px 0 16px; font-size: 10px;
    color: var(--accent2);
    letter-spacing: 2px; text-transform: uppercase;
    font-style: normal;
  }
  .row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 6px 0; }
  .roster { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin: 10px 0; }
  .slot {
    background: var(--bg);
    border: 2px solid var(--line);
    border-radius: 0;
    padding: 6px 8px;
    min-height: 44px;
    display: flex; align-items: center; gap: 8px;
    text-align: left;
    position: relative;
    font-size: 11px;
  }
  .slot.host { border-color: var(--warn); }
  .slot.mine { border-color: var(--accent); }
  /* Dashed border for AI = pixel-tick pattern done with image. */
  .slot.ai {
    border-style: solid;
    border-color: var(--accent2);
    background-image: repeating-linear-gradient(45deg, transparent 0 4px, rgba(152,208,152,.07) 4px 8px);
  }
  .swatch {
    width: 14px; height: 14px; border-radius: 0; flex-shrink: 0;
    border: 1px solid var(--line);
    box-shadow: none;
    image-rendering: pixelated;
  }
  .slotname { font-weight: 700; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .slotinfo { font-size: 9px; color: var(--muted); font-style: normal; letter-spacing: 1px; text-transform: uppercase; }
  .empty .swatch {
    background: transparent;
    background-image: repeating-linear-gradient(45deg, transparent 0 2px, var(--muted) 2px 4px);
    border-color: var(--muted);
  }
  .empty .slotname { color: var(--muted); }
  .slotbtn {
    margin-left: auto; padding: 2px 6px; font-size: 9px;
    background: transparent; color: var(--fg);
    border: 1px solid var(--accent);
    border-radius: 0;
    cursor: pointer; box-shadow: none; letter-spacing: 1px;
    font-weight: 700; text-transform: uppercase;
  }
  .slotbtn:hover { background: var(--accent); color: var(--bg-dk); }
  .slotbtn.unclaim { border-color: var(--warn); }
  .slotbtn.unclaim:hover { background: var(--warn); color: var(--bg-dk); }
  .specrow {
    margin-top: 6px; padding: 4px 6px;
    background: var(--bg);
    border: 1px solid var(--muted);
    border-radius: 0;
    text-align: left; font-size: 10px; min-height: 24px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .specrow .label { color: var(--muted); font-weight: 700; letter-spacing: 1px; font-size: 9px; }
  .specchip {
    display: inline-block; background: var(--bg-dk);
    border: 1px solid var(--muted);
    padding: 1px 5px; border-radius: 0;
    margin: 1px 2px; font-size: 9px;
  }
  .specchip.me { background: var(--accent); color: var(--bg-dk); border-color: var(--accent); }
  .roomcode {
    font-size: 22px; font-weight: 700; letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 2px 2px 0 var(--bg-dk);
    margin: 4px 0; cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  .roomcode:hover { color: var(--accent2); }
  .hint {
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase;
  }
  #status {
    margin-top: 8px; min-height: 16px; font-size: 10px;
    color: var(--accent2);
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* Floating audio/fullscreen — square little chiclets. */
  #audio-toggle, #fs-toggle {
    position: fixed; top: 10px; z-index: 50;
    width: 28px; height: 28px;
    border-radius: 0;
    padding: 0;
    border: 2px solid var(--line);
    background: var(--bg-dk);
    color: var(--accent);
    font-size: 12px; letter-spacing: 0;
    box-shadow: 2px 2px 0 0 var(--accent);
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: none;
  }
  #audio-toggle { right: 10px; }
  #fs-toggle    { right: 46px; }
  #audio-toggle.muted { color: var(--muted); }
  #audio-toggle:hover, #fs-toggle:hover { background: var(--accent); color: var(--bg-dk); }

  /* Fullscreen — canvas dominates, chrome shrinks. */
  :fullscreen body, :fullscreen #game { background: var(--bg-dk); }
  :fullscreen #game { width: 100vw; height: 100vh; justify-content: center; gap: 4px; }
  :fullscreen #hud { width: min(960px, 96vw); margin-top: 2px; }
  :fullscreen canvas {
    width: auto;
    height: min(calc(100vh - 100px), calc((100vw - 12px) * 11 / 15));
    aspect-ratio: 15 / 11;
    max-width: calc(100vw - 12px);
    max-height: calc(100vh - 100px);
  }
  :fullscreen .controls-help { font-size: 9px; }

  /* ── GAME ── */
  #game { display: none; flex-direction: column; align-items: center; gap: 6px; }
  #hud {
    display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
    width: 960px; max-width: 96vw;
  }
  .pcard {
    background: var(--bg-dk);
    border: 2px solid var(--line);
    border-radius: 0;
    padding: 4px 6px;
    display: flex; align-items: center; gap: 6px;
    font-size: 10px;
    min-width: 150px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pcard.dead { opacity: .35; }
  .pcard.dead .pname { text-decoration: line-through; }
  .pcard.me { border-color: var(--accent); }
  .pswatch {
    width: 10px; height: 10px;
    border-radius: 0;
    border: 1px solid var(--line);
    box-shadow: none;
    image-rendering: pixelated;
  }
  .stat { color: var(--accent2); font-variant-numeric: tabular-nums; }
  .pname { font-weight: 700; }

  canvas {
    background: #0a0814;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 960px; height: 704px;
    max-width: 96vw; max-height: calc(100vh - 160px);
    /* Hard 4px frame — no rounding, no glow. */
    border: 4px solid var(--line);
    border-radius: 0;
    box-shadow: 4px 4px 0 0 var(--accent);
  }

  #overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(26,14,42,.92);
    z-index: 10;
  }
  #overlay .card {
    background: var(--bg-dk);
    border: 3px solid var(--line);
    border-radius: 0;
    padding: 22px 32px;
    text-align: center;
    box-shadow: 4px 4px 0 0 var(--accent2);
  }
  #overlay h2 {
    margin: 0 0 12px; font-size: 18px;
    letter-spacing: 3px; font-weight: 700;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 var(--bg);
  }

  .controls-help {
    font-size: 9px;
    color: var(--muted);
    text-align: center; margin-top: 2px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .controls-help kbd {
    background: var(--bg-dk);
    border: 1px solid var(--fg);
    border-radius: 0;
    padding: 0 4px;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    color: var(--fg);
  }

  /* Mobile virtual D-pad — chunky GBA-style. */
  #mobile-pad { display: none; }
  body.mobile #mobile-pad {
    display: grid; position: fixed; bottom: 14px; left: 14px;
    grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 2px;
    z-index: 20; touch-action: none;
  }
  body.mobile #mobile-bomb {
    display: flex; position: fixed; bottom: 32px; right: 18px;
    width: 76px; height: 76px;
    border-radius: 0;
    align-items: center; justify-content: center;
    background: var(--accent);
    border: 3px solid var(--line);
    color: var(--bg-dk);
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 11px;
    text-transform: uppercase;
    z-index: 20;
    box-shadow: 3px 3px 0 0 var(--bg-dk);
    touch-action: none;
    -webkit-font-smoothing: none;
  }
  #mobile-bomb { display: none; }
  .pad-btn {
    background: var(--bg-dk);
    border: 2px solid var(--line);
    border-radius: 0;
    color: var(--fg);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .pad-btn.active { background: var(--accent); color: var(--bg-dk); }
  .pad-empty { visibility: hidden; }
</style>
</head>
<body>

<button id="audio-toggle" title="audio" aria-label="toggle audio">♪</button>
<button id="fs-toggle" title="fullscreen" aria-label="toggle fullscreen">⛶</button>

<div id="lobby">
  <h1>PLAYING WITH GOOL<span class="accent">Z</span></h1>
  <p class="tag">four wisps · one lantern drifts home</p>

  <div id="lobby-name" class="row">
    <input type="text" name="name" placeholder="your name" maxlength="16" autocomplete="off">
    <button id="btn-color" title="cycle wisp color">color</button>
  </div>

  <div id="lobby-actions" class="row">
    <button id="btn-create">CREATE ROOM</button>
    <span style="align-self:center;opacity:.5">or</span>
    <input type="text" name="code" placeholder="ROOM CODE" maxlength="6" autocomplete="off">
    <button id="btn-join" class="alt">JOIN</button>
  </div>

  <div id="lobby-actions2" class="row">
    <button id="btn-solo" class="alt" title="play offline against AI">PLAY SOLO</button>
  </div>

  <div id="lobby-room" style="display:none">
    <div class="hint">share this code:</div>
    <div class="roomcode" id="roomcode" title="click to copy">------</div>
    <div class="row" style="margin:4px 0">
      <button id="btn-copylink" class="alt" style="padding:6px 14px;font-size:11px">COPY LINK</button>
      <button id="btn-add-ai" class="alt" style="padding:6px 14px;font-size:11px">+ ADD GHOST</button>
    </div>
    <div class="hint" id="copyhint">click code to copy</div>
    <div class="roster" id="roster"></div>
    <div class="specrow" id="specrow">
      <span class="label">SPECTATORS</span>
      <span id="speclist" style="margin-left:8px;opacity:.55">— none —</span>
    </div>
    <div class="row">
      <button id="btn-start">START</button>
      <button id="btn-leave" class="alt">LEAVE</button>
    </div>
    <div class="hint" id="hostHint">waiting for host…</div>
  </div>

  <div id="status" role="status" aria-live="polite"></div>
  <div class="controls-help">
    <kbd>WASD</kbd> / <kbd>↑↓←→</kbd> drift &nbsp;·&nbsp; <kbd>Space</kbd> / <kbd>K</kbd> place candle
  </div>
</div>

<div id="game">
  <div id="hud"></div>
  <canvas id="cv" width="480" height="352" aria-label="game"></canvas>
  <div class="controls-help">
    <kbd>WASD</kbd> drift &nbsp;·&nbsp; <kbd>Space</kbd> candle &nbsp;·&nbsp;
    <span style="color:var(--accent)">●</span> +candle &nbsp;
    <span style="color:var(--accent2)">●</span> +hex &nbsp;
    <span style="color:#e6c890">●</span> +drift
  </div>
</div>

<div id="mobile-pad" aria-hidden="true">
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="up">▲</div>
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="left">◀</div>
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="right">▶</div>
  <div class="pad-empty"></div>
  <div class="pad-btn" data-dir="down">▼</div>
  <div class="pad-empty"></div>
</div>
<button id="mobile-bomb" aria-label="place candle">CANDLE</button>

<div id="overlay"><div class="card">
  <h2 id="overTitle">·  ·  ·</h2>
  <div id="overSub" style="margin-bottom:18px;opacity:.85;font-style:italic"></div>
  <button id="btn-rematch">REMATCH</button>
  <button id="btn-back" class="alt">LOBBY</button>
</div></div>

<script>
'use strict';

// ───────────────────────────────────────────────────────────────────────
// Constants & state
// ───────────────────────────────────────────────────────────────────────
const W = 15, H = 11, TILE = 32;
const T_EMPTY = 0, T_WALL = 1, T_BARREL = 2;
const PU_BOMB = 0, PU_POWER = 1, PU_SPEED = 2;
const PU_NAMES = ['candle','hex','drift'];

// Four wisps: faint violet, sage, candleglow, bone.
const COLORS  = ['#b6a4dc','#a8c89c','#e6c890','#dcd7c2'];
const COLOR_NAMES = ['violet','sage','candle','bone'];
const SPAWNS = [[1,1],[W-2,1],[1,H-2],[W-2,H-2]];

const BOMB_FUSE = 2.4;          // seconds
const FIRE_TIME = 0.55;
const POWERUP_CHANCE = 0.34;    // per barrel
const BASE_SPEED = 4.6;         // tiles/s
const SPEED_STEP = 0.85;        // tiles/s per powerup
const MAX_POWER = 9;
const MAX_BOMBS = 9;
const MAX_SPEED_TIER = 5;

let tiles, barrelLoot, powerups, players, bombs, fires;
let me = { id: null, name: 'player', color: 0, slot: -1, host: false };
let ws = null;
let scene = 'lobby';     // 'lobby' | 'game' | 'spectate'
let started = false;     // server-side game-in-progress flag
let endResult = null;    // {kind, winner?}
let lastNetSend = 0;
const peers = new Map(); // id -> {name, color, slot}
function isSpectating() { return scene === 'game' && me.slot < 0; }

// ───────────────────────────────────────────────────────────────────────
// Deterministic RNG (xmur3 + mulberry32)
// ───────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  let a = seed >>> 0;
  return function() {
    a = (a + 0x6d2b79f5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ───────────────────────────────────────────────────────────────────────
// Map generation (deterministic per seed)
// ───────────────────────────────────────────────────────────────────────
function generateMap(seed) {
  const rng = mulberry32(seed);
  tiles = new Uint8Array(W * H);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const isBorder = x === 0 || y === 0 || x === W - 1 || y === H - 1;
      const isPillar = (x % 2 === 0) && (y % 2 === 0);
      tiles[y * W + x] = (isBorder || isPillar) ? T_WALL : T_EMPTY;
    }
  }
  // Spawn safe zones (3x3 around each spawn corner)
  const safe = new Set();
  for (const [sx, sy] of SPAWNS) {
    for (let dy = 0; dy <= 2; dy++) {
      for (let dx = 0; dx <= 2; dx++) {
        const x = sx + (sx === 1 ? dx : -dx);
        const y = sy + (sy === 1 ? dy : -dy);
        if (x >= 0 && x < W && y >= 0 && y < H) safe.add(y * W + x);
      }
    }
  }
  // Place barrels in remaining empty tiles
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (tiles[i] !== T_EMPTY) continue;
      if (safe.has(i)) continue;
      if (rng() < 0.82) tiles[i] = T_BARREL;
    }
  }
  // Pre-decide hidden powerups under barrels (kind or -1)
  barrelLoot = new Int8Array(W * H);
  barrelLoot.fill(-1);
  for (let i = 0; i < W * H; i++) {
    if (tiles[i] !== T_BARREL) continue;
    if (rng() < POWERUP_CHANCE) {
      const r = rng();
      barrelLoot[i] = r < 0.42 ? PU_BOMB : r < 0.78 ? PU_POWER : PU_SPEED;
    }
  }
}

// ───────────────────────────────────────────────────────────────────────
// Game state initialisation
// ───────────────────────────────────────────────────────────────────────
function initGame(seed, roster) {
  generateMap(seed);
  powerups = []; bombs = []; fires = [];
  players = {};
  endResult = null;

  // Build players from roster (only those with a slot)
  for (const r of roster) {
    if (r.slot < 0 || r.slot > 3) continue;
    const [sx, sy] = SPAWNS[r.slot];
    players[r.id] = {
      id: r.id, name: r.name, color: r.color, slot: r.slot,
      // Logical tile (the source of truth for collision/bombs/pickups)
      tileX: sx, tileY: sy,
      // Render position (interpolated during a step, otherwise pinned to tile center)
      x: sx * TILE + TILE / 2, y: sy * TILE + TILE / 2,
      // Step animation state — null when idle.
      step: null,
      vx: 0, vy: 0, dir: 1,
      bombs: 1, power: 2, speedTier: 0,
      bombsActive: 0, alive: true,
      // Networked target (only meaningful for remote peers in netplay)
      tx: sx * TILE + TILE / 2, ty: sy * TILE + TILE / 2,
    };
  }
  scene = 'game';
  started = true;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('overlay').style.display = 'none';
  // spectator banner
  let banner = document.getElementById('spec-banner');
  if (isSpectating()) {
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'spec-banner';
      banner.style.cssText = 'background:var(--accent);color:#fff;padding:6px 16px;border-radius:6px;font-weight:700;letter-spacing:2px;font-size:12px;';
      banner.textContent = '👁  SPECTATING — wait for next round to claim a seat';
      document.getElementById('game').prepend(banner);
    }
    banner.style.display = '';
  } else if (banner) {
    banner.style.display = 'none';
  }
  rebuildHud();
}

function localPlayer() { return players[me.id]; }

// ───────────────────────────────────────────────────────────────────────
// Tile / collision helpers
// ───────────────────────────────────────────────────────────────────────
function tileAt(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= W || ty >= H) return T_WALL;
  return tiles[ty * W + tx];
}
function bombAt(tx, ty) {
  for (const b of bombs) if (b.tx === tx && b.ty === ty) return b;
  return null;
}
function powerupAt(tx, ty) {
  for (const p of powerups) if (p.tx === tx && p.ty === ty) return p;
  return null;
}
function isSolid(tx, ty, ignoreBomb) {
  const t = tileAt(tx, ty);
  if (t === T_WALL || t === T_BARREL) return true;
  const b = bombAt(tx, ty);
  if (b && b !== ignoreBomb) return true;
  return false;
}

// ───────────────────────────────────────────────────────────────────────
// Local player input + simulation
// ───────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', (e) => {
  if (scene !== 'game') return;
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === ' ' || k === 'k') {
    e.preventDefault();
    tryDropBomb();
  }
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });

function inputVec() {
  let ix = 0, iy = 0;
  if (keys['w'] || keys['arrowup']) iy -= 1;
  if (keys['s'] || keys['arrowdown']) iy += 1;
  if (keys['a'] || keys['arrowleft']) ix -= 1;
  if (keys['d'] || keys['arrowright']) ix += 1;
  return [ix, iy];
}

// ───────────────────────────────────────────────────────────────────────
// Discrete tile-step movement. Each entity occupies exactly one tile at
// rest. A "step" is an animated transition into an adjacent tile that
// takes 1/(BASE_SPEED+...) seconds. While a step is in flight, input is
// ignored — the entity finishes the step before the next one is queued.
// This keeps everything aligned to the grid and makes AI trivial.
// ───────────────────────────────────────────────────────────────────────
function tileCenterX(tx) { return tx * TILE + TILE / 2; }
function tileCenterY(ty) { return ty * TILE + TILE / 2; }

// Begin a step into the adjacent tile (dx,dy ∈ {-1,0,1}, exactly one nonzero).
// Returns true if the step was started, false if blocked or already stepping.
function startStep(p, dx, dy) {
  if (p.step) return false;
  if (!dx && !dy) return false;
  const ntx = p.tileX + dx, nty = p.tileY + dy;
  // Allow walking off a bomb you're standing on (the one you just placed).
  const ignoreBomb = bombAt(p.tileX, p.tileY);
  if (isSolid(ntx, nty, ignoreBomb)) return false;
  // Don't walk into another live player on their resting tile.
  for (const id in players) {
    const o = players[id];
    if (!o || !o.alive || o === p) continue;
    if (!o.step && o.tileX === ntx && o.tileY === nty) return false;
  }
  const tilesPerSec = BASE_SPEED + p.speedTier * SPEED_STEP;
  p.step = {
    fromX: tileCenterX(p.tileX), fromY: tileCenterY(p.tileY),
    toX:   tileCenterX(ntx),     toY:   tileCenterY(nty),
    progress: 0,
    duration: 1 / tilesPerSec,
  };
  p.tileX = ntx; p.tileY = nty;
  if (dx > 0) p.dir = 1;
  else if (dx < 0) p.dir = 3;
  else if (dy > 0) p.dir = 2;
  else p.dir = 0;
  p.vx = dx * tilesPerSec * TILE;
  p.vy = dy * tilesPerSec * TILE;
  return true;
}

// Advance an in-flight step. Returns true the moment the step completes.
function advanceStep(p, dt) {
  if (!p.step) {
    // Pin render position to tile center so nothing drifts.
    p.x = tileCenterX(p.tileX);
    p.y = tileCenterY(p.tileY);
    p.vx = p.vy = 0;
    return false;
  }
  p.step.progress += dt / p.step.duration;
  if (p.step.progress >= 1) {
    p.x = p.step.toX;
    p.y = p.step.toY;
    p.step = null;
    p.vx = p.vy = 0;
    return true;
  }
  const t = p.step.progress;
  p.x = p.step.fromX + (p.step.toX - p.step.fromX) * t;
  p.y = p.step.fromY + (p.step.toY - p.step.fromY) * t;
  return false;
}

// Local human player: read input, finish/start steps. Discrete grid.
function moveLocal(p, dt) {
  advanceStep(p, dt);
  if (p.step) return;                       // mid-step — no new input
  const [ix, iy] = inputVec();
  if (!ix && !iy) return;
  // Single-axis preferred. Diagonal: try horizontal first, fall back to vertical.
  if (ix && !iy) { startStep(p, ix, 0); return; }
  if (iy && !ix) { startStep(p, 0, iy); return; }
  if (!startStep(p, ix, 0)) startStep(p, 0, iy);
}

// ───────────────────────────────────────────────────────────────────────
// Bombs
// ───────────────────────────────────────────────────────────────────────
function tryDropBomb() {
  const p = localPlayer();
  if (!p || !p.alive || endResult) return;
  if (p.bombsActive >= p.bombs) return;
  const tx = p.tileX, ty = p.tileY;
  if (bombAt(tx, ty)) return;
  if (tileAt(tx, ty) !== T_EMPTY) return;
  spawnBomb(p.id, tx, ty, p.power, performance.now() / 1000);
  netSend({ t: 'bomb', tx, ty, power: p.power, t0: Date.now() });
}

function spawnBomb(ownerId, tx, ty, power, localT) {
  const b = { ownerId, tx, ty, power, fuseUntil: localT + BOMB_FUSE };
  bombs.push(b);
  const owner = players[ownerId];
  if (owner) owner.bombsActive++;
}

function explodeBomb(b) {
  // Remove from list
  const idx = bombs.indexOf(b);
  if (idx === -1) return;
  bombs.splice(idx, 1);
  const owner = players[b.ownerId];
  if (owner) owner.bombsActive = Math.max(0, owner.bombsActive - 1);

  // Track the tiles burned by THIS explosion so the bomb owner can
  // authoritatively claim kills below (independent of any other bombs
  // currently in the global `fires` array).
  const burned = [];
  const burn = (x, y) => { addFire(x, y); burned.push([x, y]); };

  // Center always burns
  burn(b.tx, b.ty);
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    for (let i = 1; i <= b.power; i++) {
      const x = b.tx + dx * i, y = b.ty + dy * i;
      const t = tileAt(x, y);
      if (t === T_WALL) break;
      if (t === T_BARREL) {
        // destroy barrel, drop loot if any
        tiles[y * W + x] = T_EMPTY;
        const loot = barrelLoot[y * W + x];
        if (loot >= 0) powerups.push({ tx: x, ty: y, kind: loot });
        burn(x, y);
        break;
      }
      burn(x, y);
      // chain reaction
      const chainBomb = bombAt(x, y);
      if (chainBomb) {
        chainBomb.fuseUntil = 0; // detonate next tick
      }
      // burn over powerup destroys it
      const pu = powerupAt(x, y);
      if (pu) powerups.splice(powerups.indexOf(pu), 1);
    }
  }

  // ── Owner-authoritative kill detection ────────────────────────────────
  // The original peer model trusted each player's own client to detect
  // death and broadcast it. That broke under network latency: the bomb
  // explodes at slightly different times on each peer (each peer starts
  // its fuse timer from when the bomb message arrived locally). A victim
  // could walk off the tile before their own client registers the fire,
  // so kills were missed and rounds never ended.
  //
  // Fix: when MY bomb explodes, I scan all players against THIS bomb's
  // fire pattern using their best-known position and broadcast a `kill`
  // claim for each hit. All peers (including the victim) honor it
  // immediately, so death animations + the win screen propagate in
  // realtime regardless of fuse-timing desync. Self-death (line 600
  // below) still fires as a redundant path.
  if (b.ownerId === me.id && burned.length) {
    let anyKilled = false;
    for (const id in players) {
      const p = players[id];
      if (!p.alive) continue;
      const ptx = Math.floor(p.x / TILE), pty = Math.floor(p.y / TILE);
      const hit = burned.some(([fx, fy]) => fx === ptx && fy === pty);
      if (!hit) continue;
      p.alive = false;
      anyKilled = true;
      if (id === me.id) {
        // I blew myself up — broadcast as a regular death.
        netSend({ t: 'death' });
      } else {
        netSend({ t: 'kill', target: id });
      }
    }
    if (anyKilled) {
      rebuildHud();
      checkEnd();
    }
  }
}

function addFire(tx, ty) {
  fires.push({ tx, ty, until: performance.now() / 1000 + FIRE_TIME });
}

// ───────────────────────────────────────────────────────────────────────
// Game loop
// ───────────────────────────────────────────────────────────────────────
let lastFrame = 0;
function frame(ts) {
  const t = ts / 1000;
  const dt = lastFrame ? Math.min(0.05, t - lastFrame) : 0;
  lastFrame = t;

  if (scene === 'game') {
    update(dt, t);
    render();
  }
  requestAnimationFrame(frame);
}

function update(dt, t) {
  // Local player movement & input
  const me_p = localPlayer();
  if (me_p && me_p.alive && !endResult) {
    moveLocal(me_p, dt);
  }
  // Smooth remote (networked) players toward their last reported target.
  // In solo mode every entity is locally simulated, so this lerp must be
  // skipped — otherwise it drags AI bots back toward their stale spawn
  // tx/ty every frame, which made bots look frozen and perpetually
  // mid-tile.
  if (!soloMode) {
    for (const id in players) {
      if (id === me.id) continue;
      const p = players[id];
      p.x += (p.tx - p.x) * Math.min(1, dt * 12);
      p.y += (p.ty - p.y) * Math.min(1, dt * 12);
    }
  }

  // Detonate fused bombs
  const now = performance.now() / 1000;
  for (let i = bombs.length - 1; i >= 0; i--) {
    if (bombs[i].fuseUntil <= now) explodeBomb(bombs[i]);
  }
  // Expire fires
  for (let i = fires.length - 1; i >= 0; i--) {
    if (fires[i].until <= now) fires.splice(i, 1);
  }

  // Pickups + soloMode AI bot pickups too. With discrete movement,
  // pickups trigger when an entity arrives on a tile (= step ended).
  for (const id in players) {
    const p = players[id];
    if (!p || !p.alive) continue;
    if (id !== me.id && !soloMode) continue; // only local + solo bots
    const pu = powerupAt(p.tileX, p.tileY);
    if (pu) {
      applyPowerup(p, pu.kind);
      powerups.splice(powerups.indexOf(pu), 1);
      if (id === me.id) { netSend({ t: 'pickup', tx: p.tileX, ty: p.tileY, kind: pu.kind }); rebuildHud(); }
    }
  }

  // Death check (any alive player on a fire tile)
  for (const id in players) {
    const p = players[id];
    if (!p.alive) continue;
    const tx = p.tileX, ty = p.tileY;
    if (fires.some(f => f.tx === tx && f.ty === ty)) {
      if (id === me.id) {
        p.alive = false;
        netSend({ t: 'death' });
        rebuildHud();
        checkEnd();
      } else if (soloMode) {
        // Solo: AI bots have no network, claim death locally.
        p.alive = false;
        rebuildHud();
        checkEnd();
      }
      // remote (networked) player: wait for their own death broadcast.
    }
  }

  // Network heartbeat: send pos at ~18Hz
  if (me_p && (t - lastNetSend) > (1 / 18)) {
    lastNetSend = t;
    netSend({ t: 'pos', x: Math.round(me_p.x), y: Math.round(me_p.y), dir: me_p.dir, alive: me_p.alive ? 1 : 0 });
  }
}

function applyPowerup(p, kind) {
  if (kind === PU_BOMB) p.bombs = Math.min(MAX_BOMBS, p.bombs + 1);
  else if (kind === PU_POWER) p.power = Math.min(MAX_POWER, p.power + 1);
  else if (kind === PU_SPEED) p.speedTier = Math.min(MAX_SPEED_TIER, p.speedTier + 1);
}

function checkEnd() {
  if (endResult) return;
  const alive = Object.values(players).filter(p => p.alive);
  if (alive.length === 1 && Object.keys(players).length > 1) {
    endResult = { kind: 'winner', winnerId: alive[0].id };
    showOverlay();
  } else if (alive.length === 0) {
    endResult = { kind: 'draw' };
    showOverlay();
  }
}

// ───────────────────────────────────────────────────────────────────────
// Rendering
// ───────────────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function render() {
  // base floor (slightly desaturated midnight)
  ctx.fillStyle = '#0e0a18';
  ctx.fillRect(0, 0, cv.width, cv.height);

  // tile pass
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      drawTile(x, y, tiles[y * W + x]);
    }
  }
  // powerups
  for (const p of powerups) drawPowerup(p);
  // bombs
  const now = performance.now() / 1000;
  for (const b of bombs) drawBomb(b, now);
  // players (sorted by y for depth)
  const ord = Object.values(players).sort((a, b) => a.y - b.y);
  for (const p of ord) drawPlayer(p, now);
  // fires (drawn over players for impact)
  for (const f of fires) drawFire(f, now);
  // particles (drift sparks on death/explosion)
  for (let i = particles.length - 1; i >= 0; i--) drawParticle(particles[i], now);
  // soft fog overlay (very subtle)
  drawFog(now);
}

// Floor tone is a quiet checker of haunt-purple over midnight.
function drawTile(x, y, kind) {
  const px = x * TILE, py = y * TILE;
  const odd = (x + y) & 1;
  ctx.fillStyle = odd ? '#14102a' : '#100c20';
  ctx.fillRect(px, py, TILE, TILE);

  if (kind === T_WALL) {
    // tower stone: a quiet old block with a single mossy highlight.
    ctx.fillStyle = '#2a2542';
    ctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
    ctx.fillStyle = '#3a3358';
    ctx.fillRect(px + 2, py + 2, TILE - 4, 3);
    ctx.fillRect(px + 2, py + 2, 3, TILE - 4);
    ctx.fillStyle = '#181429';
    ctx.fillRect(px + 2, py + TILE - 5, TILE - 4, 3);
    ctx.fillRect(px + TILE - 5, py + 2, 3, TILE - 4);
    // moss fleck (deterministic-ish per tile)
    if (((x * 7 + y * 13) & 7) === 0) {
      ctx.fillStyle = 'rgba(185,211,164,.35)';
      ctx.fillRect(px + 6, py + 6, 2, 2);
    }
  } else if (kind === T_BARREL) {
    // Same gravestone shape as a wall block, just a lighter grey so
    // it reads as breakable at a glance. Cool dark violet = stone you
    // can't break; lighter grey = stone you can.
    ctx.fillStyle = '#5a5470';
    ctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
    ctx.fillStyle = '#6e687f';
    ctx.fillRect(px + 2, py + 2, TILE - 4, 3);
    ctx.fillRect(px + 2, py + 2, 3, TILE - 4);
    ctx.fillStyle = '#3a3450';
    ctx.fillRect(px + 2, py + TILE - 5, TILE - 4, 3);
    ctx.fillRect(px + TILE - 5, py + 2, 3, TILE - 4);
  }
}

// Soft fog: a barely-there moving gradient. Cheap, low alpha.
let _fogPhase = Math.random() * 1000;
function drawFog(now) {
  if (prefersReducedMotion) return;
  const w = cv.width, h = cv.height;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.04;
  const cx = w * 0.5 + Math.sin(now * 0.1 + _fogPhase) * 60;
  const cy = h * 0.55 + Math.cos(now * 0.08) * 40;
  const g = ctx.createRadialGradient(cx, cy, 20, cx, cy, w * 0.7);
  g.addColorStop(0, '#b6a4dc');
  g.addColorStop(1, 'rgba(182,164,220,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
}

const prefersReducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

// Particle pool — short-lived drift sparks.
const particles = [];
function emitParticles(px, py, color, count) {
  if (prefersReducedMotion) count = Math.min(count, 4);
  const t = performance.now() / 1000;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: px, y: py,
      vx: (Math.random() - 0.5) * 40,
      vy: -10 - Math.random() * 30,
      life: t + 0.6 + Math.random() * 0.4,
      born: t,
      color,
    });
  }
}
function drawParticle(p, now) {
  const lifeT = (p.life - now);
  if (lifeT <= 0) { particles.splice(particles.indexOf(p), 1); return; }
  const dt = now - p.born;
  const x = p.x + p.vx * dt;
  const y = p.y + p.vy * dt + dt * dt * 30;
  const a = Math.max(0, lifeT);
  ctx.fillStyle = p.color;
  ctx.globalAlpha = a;
  ctx.fillRect(x | 0, y | 0, 2, 2);
  ctx.globalAlpha = 1;
}

// "Bombs" are candles. A short pillar with a flickering flame and a faint glow.
function drawBomb(b, now) {
  const px = b.tx * TILE + TILE / 2;
  const py = b.ty * TILE + TILE / 2;
  const remaining = Math.max(0, b.fuseUntil - now);
  const phase = BOMB_FUSE - remaining;
  const pulse = 0.5 + 0.5 * Math.sin(phase * (10 + phase * 6));
  // soft glow (warm)
  const glow = ctx.createRadialGradient(px, py - 2, 1, px, py - 2, TILE * 0.6);
  glow.addColorStop(0, `rgba(230,200,144,${0.18 + pulse * 0.18})`);
  glow.addColorStop(1, 'rgba(230,200,144,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(px - TILE * 0.6, py - TILE * 0.6, TILE * 1.2, TILE * 1.2);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(px, py + 7, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  // candle pillar (bone-pale)
  ctx.fillStyle = '#dcd2b6';
  ctx.fillRect(px - 4, py - 3, 8, 9);
  ctx.fillStyle = '#9a8e74';
  ctx.fillRect(px - 4, py + 4, 8, 2);
  // wax drip
  ctx.fillStyle = '#c8bda0';
  ctx.fillRect(px + 2, py - 1, 1, 4);
  // wick
  ctx.fillStyle = '#1a1530';
  ctx.fillRect(px - 1, py - 6, 2, 3);
  // flame (teardrop, sage-tinted, flickers warm at end of fuse)
  const flameH = 6 + pulse * 3;
  const warm = phase / BOMB_FUSE;
  // outer flame
  ctx.fillStyle = `rgba(${Math.round(185 + warm * 60)},${Math.round(211 - warm * 30)},${Math.round(164 - warm * 60)},.85)`;
  ctx.beginPath();
  ctx.ellipse(px, py - 6 - flameH * 0.4, 2.4, flameH * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // hot core
  ctx.fillStyle = '#fff4d0';
  ctx.fillRect(px - 1, py - 7, 2, 3);
}

// Player is a wisp: a soft glowing droplet with two pinpoint eyes.
// Tinted by player color. Idle gentle bob, brighter glow when moving.
function drawPlayer(p, now) {
  const px = p.x, py = p.y;
  const col = COLORS[p.color] || '#dcd7c2';
  // ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(px, py + 9, 7, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  if (!p.alive) {
    // dispersed wisp — much fainter, drifting up
    const fade = 0.3;
    ctx.globalAlpha = fade;
    ctx.fillStyle = col;
    const driftY = Math.sin(now * 1.3 + p.slot) * 3;
    ctx.beginPath(); ctx.ellipse(px, py - 4 + driftY, 7, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    return;
  }

  // idle gentle float, small extra bob when moving
  const moving = Math.abs(p.vx) + Math.abs(p.vy) > 1;
  const float = Math.sin(now * 2.4 + p.slot * 1.7) * 1.4;
  const bob = moving ? Math.sin(now * 12) * 0.8 : 0;
  const yy = py + float + bob;

  // outer glow (soft halo)
  const halo = ctx.createRadialGradient(px, yy - 4, 1, px, yy - 4, 14);
  halo.addColorStop(0, hexToRGBA(col, 0.45));
  halo.addColorStop(1, hexToRGBA(col, 0));
  ctx.fillStyle = halo;
  ctx.fillRect(px - 14, yy - 18, 28, 28);

  // body — rounded teardrop
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.ellipse(px, yy - 4, 7, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  // soft inner highlight
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.beginPath(); ctx.ellipse(px - 2, yy - 7, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();

  // wisp tail (small wavering tail beneath)
  ctx.fillStyle = hexToRGBA(col, 0.7);
  ctx.beginPath();
  ctx.moveTo(px - 4, yy + 4);
  ctx.quadraticCurveTo(px + Math.sin(now * 6) * 2, yy + 8, px + 4, yy + 4);
  ctx.lineTo(px + 2, yy + 2);
  ctx.lineTo(px - 2, yy + 2);
  ctx.closePath();
  ctx.fill();

  // eyes (face direction). Small ink dots.
  ctx.fillStyle = '#0a0712';
  let ex = 0, ey = -6;
  if (p.dir === 1) ex = 1;          // right
  else if (p.dir === 3) ex = -1;    // left
  else if (p.dir === 0) ey = -7;    // up
  else ey = -5;                     // down
  ctx.fillRect(px - 2 + ex, yy + ey, 1.5, 2);
  ctx.fillRect(px + 2 + ex, yy + ey, 1.5, 2);

  // small marker over the local player (down-pointing chevron in sage)
  if (p.id === me.id) {
    ctx.fillStyle = 'rgba(185,211,164,.85)';
    ctx.beginPath();
    ctx.moveTo(px, yy - 14);
    ctx.lineTo(px - 3, yy - 18);
    ctx.lineTo(px + 3, yy - 18);
    ctx.closePath();
    ctx.fill();
  }
}

function hexToRGBA(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// Powerups are floating votive motes — three flavors, three colors.
function drawPowerup(p) {
  const px = p.tx * TILE + TILE / 2, py = p.ty * TILE + TILE / 2;
  const t = performance.now() / 1000;
  const bob = Math.sin(t * 3 + p.tx + p.ty) * 2;
  const col = p.kind === PU_BOMB ? COLORS[0]      // violet — more candles
            : p.kind === PU_POWER ? COLORS[1]     // sage — longer hex
            : COLORS[2];                          // candle-gold — drift
  // glow halo
  const g = ctx.createRadialGradient(px, py + bob, 1, px, py + bob, TILE * 0.55);
  g.addColorStop(0, hexToRGBA(col, 0.45));
  g.addColorStop(1, hexToRGBA(col, 0));
  ctx.fillStyle = g;
  ctx.fillRect(px - TILE * 0.6, py + bob - TILE * 0.6, TILE * 1.2, TILE * 1.2);
  // mote orb
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(px, py + bob, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.arc(px - 1.5, py + bob - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();
  // tiny rune mark
  ctx.fillStyle = 'rgba(10,7,18,.65)';
  if (p.kind === PU_BOMB) { ctx.fillRect(px, py + bob - 1, 1, 3); ctx.fillRect(px - 1, py + bob, 3, 1); }
  else if (p.kind === PU_POWER) { ctx.fillRect(px - 2, py + bob, 5, 1); }
  else { ctx.fillRect(px - 2, py + bob - 1, 1, 1); ctx.fillRect(px, py + bob, 1, 1); ctx.fillRect(px + 2, py + bob + 1, 1, 1); }
}

// Blast is candle-fire: sage flame core, violet halo edge.
function drawFire(f, now) {
  const px = f.tx * TILE, py = f.ty * TILE;
  const tLeft = Math.max(0, f.until - now);
  const phase = 1 - tLeft / FIRE_TIME;
  const a = Math.sin(phase * Math.PI);
  const inset = Math.max(2, 8 - a * 7);
  // halo
  ctx.fillStyle = `rgba(182,164,220,${0.55 * a})`;
  ctx.fillRect(px + inset - 3, py + inset - 3, TILE - inset * 2 + 6, TILE - inset * 2 + 6);
  // mid (sage)
  ctx.fillStyle = `rgba(185,211,164,${0.85 * a})`;
  ctx.fillRect(px + inset, py + inset, TILE - inset * 2, TILE - inset * 2);
  // hot core (bone-pale)
  ctx.fillStyle = `rgba(255,250,220,${a})`;
  ctx.fillRect(px + inset + 4, py + inset + 4, TILE - inset * 2 - 8, TILE - inset * 2 - 8);
  // drifting embers
  if (!prefersReducedMotion) {
    for (let i = 0; i < 2; i++) {
      const r = (now * 13 + i * 2.7 + f.tx + f.ty) % 1;
      const sx = px + 4 + r * (TILE - 8);
      const sy = py + (TILE - 4) - phase * (TILE - 8);
      ctx.fillStyle = `rgba(230,200,144,${(1 - phase) * 0.9})`;
      ctx.fillRect(sx | 0, sy | 0, 2, 2);
    }
  }
}

function rebuildHud() {
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  const ord = Object.values(players).sort((a, b) => a.slot - b.slot);
  for (const p of ord) {
    const card = document.createElement('div');
    card.className = 'pcard' + (p.alive ? '' : ' dead') + (p.id === me.id ? ' me' : '');
    const sw = COLORS[p.color];
    card.innerHTML =
      `<div class="pswatch" style="background:${sw};color:${sw}"></div>` +

      `<div class="stat">candle ${p.bombs} · hex ${p.power} · drift ${p.speedTier + 1}</div></div>`;
    hud.appendChild(card);
  }
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

// ───────────────────────────────────────────────────────────────────────
// Networking
// ───────────────────────────────────────────────────────────────────────
let pendingRoom = null;

function netSend(obj) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify(obj));
}

function connect(roomCode) {
  return new Promise((resolve, reject) => {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const host = location.host || 'localhost:8787';
    const url = `${proto}://${host}/api/pwg/ws/${roomCode}`;
    ws = new WebSocket(url);
    let opened = false;
    ws.onopen = () => { opened = true; resolve(); };
    ws.onmessage = (ev) => onNetMessage(ev.data);
    ws.onclose = () => {
      if (!opened) reject(new Error('connection failed'));
      else handleDisconnect();
    };
    ws.onerror = () => { if (!opened) reject(new Error('connection error')); };
  });
}

function handleDisconnect() {
  setStatus('disconnected — refresh to reconnect');
}

function onNetMessage(data) {
  let m;
  try { m = JSON.parse(data); } catch { return; }

  if (m.t === 'welcome') {
    me.id = m.id;
    started = !!m.started;
    netSend({ t: 'join', name: me.name, color: me.color });
    return;
  }
  if (m.t === 'roster') {
    peers.clear();
    for (const r of m.list) peers.set(r.id, r);
    started = !!m.started;
    me.host = (m.hostId === me.id);
    // sync my own slot/color from server-side roster (server-authoritative)
    const myEntry = m.list.find(r => r.id === me.id);
    if (myEntry) { me.slot = myEntry.slot; me.color = myEntry.color; updateColorBtn(); }
    renderRoster(m.list, m.hostId);

    // Start button only visible when host AND seated AND ≥2 seated AND not started
    const seatedCount = m.list.filter(r => r.slot >= 0).length;
    const canStart = me.host && me.slot >= 0 && seatedCount >= 2 && !started;
    const btnStart = document.getElementById('btn-start');
    btnStart.style.display = (me.host && !started) ? '' : 'none';
    btnStart.disabled = !canStart;

    const hint = document.getElementById('hostHint');
    if (started) {
      hint.textContent = 'match in progress — waiting for next round…';
    } else if (me.slot < 0) {
      hint.textContent = me.host
        ? 'click SIT to take a seat — need ≥ 2 seated to start'
        : 'click SIT to take a seat (or spectate)';
    } else if (seatedCount < 2) {
      hint.textContent = 'need at least 2 seated to start';
    } else {
      hint.textContent = me.host ? 'you are host — start when ready' : 'waiting for host to start…';
    }
    return;
  }
  if (m.t === 'start') {
    initGame(m.seed, m.roster);
    return;
  }
  if (m.t === 'reset') {
    started = false;
    backToRoom();
    return;
  }
  if (m.t === 'leave') {
    const p = players && players[m.id];
    if (p && p.alive) {
      p.alive = false;
      checkEnd();
      rebuildHud();
    }
    return;
  }
  if (!players) return;

  // peer→peer messages: ignore our own echoes
  if (m.id === me.id) return;
  const p = players[m.id];
  if (!p) return;

  if (m.t === 'pos') {
    p.tx = m.x; p.ty = m.y; p.dir = m.dir;
    if (m.alive === 0 && p.alive) { p.alive = false; rebuildHud(); checkEnd(); }
  } else if (m.t === 'bomb') {
    spawnBomb(m.id, m.tx, m.ty, m.power, performance.now() / 1000);
  } else if (m.t === 'pickup') {
    const pu = powerupAt(m.tx, m.ty);
    if (pu) {
      applyPowerup(p, m.kind);
      powerups.splice(powerups.indexOf(pu), 1);
      rebuildHud();
    }
  } else if (m.t === 'death') {
    p.alive = false; rebuildHud(); checkEnd();
  } else if (m.t === 'kill') {
    // Bomb-owner authoritative kill claim: target may be any player.
    const target = players[m.target];
    if (target && target.alive) {
      target.alive = false;
      rebuildHud();
      checkEnd();
    }
  }
}

function renderRoster(list, hostId) {
  const slots = document.getElementById('roster');
  slots.innerHTML = '';
  const bySlot = {};
  for (const r of list) if (r.slot >= 0 && r.slot <= 3) bySlot[r.slot] = r;
  const canChange = !started; // only when no game in progress

  for (let i = 0; i < 4; i++) {
    const r = bySlot[i];
    const s = document.createElement('div');
    s.className = 'slot' + (r ? '' : ' empty');
    if (r && r.id === hostId) s.classList.add('host');
    if (r && r.id === me.id) s.classList.add('mine');

    if (r) {
      const isAi = !!r.ai;
      if (isAi) s.classList.add('ai');
      const sw = COLORS[r.color] || '#888';
      const hostMark = (r.id === hostId && !isAi) ? ' <span style="color:var(--accent2);font-size:11px">· host</span>' : '';
      const aiMark = isAi ? ' <span style="color:var(--accent);font-size:11px;font-style:italic">· ghost</span>' : '';
      s.innerHTML =
        `<div class="swatch" style="background:${sw};color:${sw}"></div>` +
        `<div style="flex:1"><div class="slotname">${escapeHtml(r.name)}${r.id === me.id ? ' (you)' : ''}${hostMark}${aiMark}</div>` +
        `<div class="slotinfo">seat ${i + 1} · ${COLOR_NAMES[r.color] || ''}</div></div>`;
      if (r.id === me.id && canChange) {
        const b = document.createElement('button');
        b.className = 'slotbtn unclaim'; b.textContent = 'STAND';
        b.onclick = () => netSend({ t: 'unclaim' });
        s.appendChild(b);
      }
    } else {
      s.innerHTML =
        `<div class="swatch"></div>` +
        `<div style="flex:1"><div class="slotname">empty seat ${i + 1}</div></div>`;
      if (canChange && me.slot < 0) {
        const b = document.createElement('button');
        b.className = 'slotbtn'; b.textContent = 'SIT';
        b.onclick = () => claimSeat(i);
        s.appendChild(b);
      } else if (canChange && me.slot === i) {
        // shouldn't happen — slot would be claimed
      }
    }
    slots.appendChild(s);
  }

  // spectators
  const specs = list.filter(r => r.slot < 0);
  const specDiv = document.getElementById('speclist');
  if (specs.length === 0) {
    specDiv.innerHTML = '<span style="opacity:.55">— none —</span>';
  } else {
    specDiv.innerHTML = specs.map(s =>
      `<span class="specchip${s.id === me.id ? ' me' : ''}">${escapeHtml(s.name)}${s.id === me.id ? ' (you)' : ''}${s.id === hostId ? ' · host' : ''}</span>`
    ).join('');
  }
}

function claimSeat(i) {
  netSend({ t: 'claim', slot: i, color: me.color });
}

// ───────────────────────────────────────────────────────────────────────
// Audio engine — Web Audio chiptune (Phrygian) + clean SFX. No files.
// ───────────────────────────────────────────────────────────────────────
const AudioEngine = (() => {
  let ac = null;
  let masterGain = null;
  let musicGain = null;
  let sfxGain = null;
  let muted = (localStorage.getItem('pwg_muted') === '1');
  let started = false;
  let musicTimer = null;
  let musicTempo = 1.0; // multiplier; ramps in sudden death
  // D Phrygian: D Eb F G A Bb C — four-bar progression with an austere bell line
  const N = (semis) => 220 * Math.pow(2, semis / 12);
  const D3 = N(-19), Eb3 = N(-18), F3 = N(-17), G3 = N(-16), A3 = N(-15), Bb3 = N(-14), C4 = N(-13);
  const D4 = N(-7), Eb4 = N(-6), F4 = N(-5), G4 = N(-4), A4 = N(-3), Bb4 = N(-2), C5 = N(-1);

  function ensure() {
    if (ac) return;
    try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; }
    masterGain = ac.createGain();
    masterGain.gain.value = muted ? 0 : 0.5;
    masterGain.connect(ac.destination);
    musicGain = ac.createGain();
    musicGain.gain.value = 0.18;
    musicGain.connect(masterGain);
    sfxGain = ac.createGain();
    sfxGain.gain.value = 0.6;
    sfxGain.connect(masterGain);
  }

  function tone(freq, dur, type, vol, attack, release, dest) {
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    o.type = type || 'square';
    o.frequency.value = freq;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + (attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur + (release || 0.05));
    o.connect(g);
    g.connect(dest || sfxGain);
    o.start(t);
    o.stop(t + dur + (release || 0.05) + 0.02);
  }

  function noiseBurst(dur, vol, lpFreq) {
    if (!ac) return;
    const t = ac.currentTime;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / ch.length);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = lpFreq || 1200;
    const g = ac.createGain();
    g.gain.value = vol;
    src.connect(lp); lp.connect(g); g.connect(sfxGain);
    src.start(t);
  }

  // ── A small five-bar Phrygian motif. Slightly mournful, never gaudy. ──
  // (degree, beats) — degree maps onto our scale [D, Eb, F, G, A, Bb, C, D']
  const SCALE = [D4, Eb4, F4, G4, A4, Bb4, C5, D4 * 2];
  const BASS  = [D3, Eb3, F3,  G3,  A3,  Bb3, C4,  D4];
  // Phrase pattern: ascending-descending sigh, returning to the tonic.
  const phrase = [
    [0,1],[2,1],[4,2],[3,1],[2,1],[1,2],[0,2],
    [0,1],[2,1],[5,2],[4,1],[3,1],[2,2],[0,4],
  ];
  const bassLine = [
    [0,4],[3,4],[1,4],[0,4],
  ];

  function startMusic() {
    if (!ac || musicTimer) return;
    let beatIx = 0;
    let bassIx = 0;
    const tickBeat = () => {
      if (!ac || muted || document.hidden) {
        musicTimer = setTimeout(tickBeat, 200);
        return;
      }
      const beatLen = 0.36 / musicTempo;
      const note = phrase[beatIx % phrase.length];
      const beats = note[1];
      const freq = SCALE[note[0]];
      // bell lead — triangle, gentle
      tone(freq, beatLen * beats * 0.7, 'triangle', 0.22, 0.01, beatLen * beats * 0.4, musicGain);
      // soft octave shimmer (very faint)
      tone(freq * 2, beatLen * beats * 0.3, 'sine', 0.06, 0.01, beatLen * beats * 0.3, musicGain);
      // bass on downbeats
      const cum = phrase.slice(0, beatIx % phrase.length + 1).reduce((s, n) => s + n[1], 0);
      if (cum % 4 === 0) {
        const b = bassLine[bassIx % bassLine.length];
        tone(BASS[b[0]], beatLen * 4 * 0.95, 'sawtooth', 0.10, 0.02, 0.4, musicGain);
        bassIx++;
      }
      beatIx++;
      musicTimer = setTimeout(tickBeat, beats * beatLen * 1000);
    };
    tickBeat();
  }

  function stopMusic() {
    if (musicTimer) clearTimeout(musicTimer);
    musicTimer = null;
  }

  function setMuted(v) {
    muted = !!v;
    localStorage.setItem('pwg_muted', muted ? '1' : '0');
    if (masterGain) masterGain.gain.value = muted ? 0 : 0.5;
  }

  function setTempo(t) { musicTempo = Math.max(0.6, Math.min(1.8, t)); }

  // SFX
  function start() {
    if (started) return;
    started = true;
    ensure();
    if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    startMusic();
  }
  function placeCandle() { ensure(); tone(440, 0.08, 'square', 0.25); tone(220, 0.05, 'square', 0.18); }
  function blast() {
    ensure();
    noiseBurst(0.32, 0.5, 1400);
    tone(110, 0.18, 'sawtooth', 0.18, 0.005, 0.18);
    tone(160, 0.1, 'square', 0.12, 0.005, 0.1);
  }
  function pickup() { ensure(); tone(660, 0.06, 'square', 0.25); tone(990, 0.08, 'triangle', 0.18, 0.005, 0.06); }
  function death() {
    ensure();
    tone(330, 0.18, 'sawtooth', 0.25, 0.005, 0.2);
    tone(165, 0.28, 'sawtooth', 0.18, 0.01, 0.3);
    noiseBurst(0.18, 0.18, 800);
  }
  function win() {
    ensure();
    [F4, A4, C5, F4 * 2].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.3, 0.01, 0.2), i * 130));
  }
  function tick() { ensure(); tone(880, 0.04, 'square', 0.18); }
  function deny() { ensure(); tone(150, 0.08, 'sawtooth', 0.2); }

  return { start, placeCandle, blast, pickup, death, win, tick, deny, setMuted, setTempo, isMuted: () => muted };
})();

function sfxPlace() { AudioEngine.placeCandle(); }
function sfxBlast() { AudioEngine.blast(); }
function sfxPickup() { AudioEngine.pickup(); }
function sfxDeath() { AudioEngine.death(); }
function sfxWin() { AudioEngine.win(); }

  try {
    if (!document.fullscreenElement) {

             document.documentElement.webkitRequestFullscreen?.());

// Death sfx hook (local player only, on first transition to dead)

function _audioFrame() {

    sfxDeath();
    emitParticles(p.x, p.y, COLORS[p.color] || '#dcd7c2', 18);

// ───────────────────────────────────────────────────────────────────────
// Solo mode — no server. Local AI controllers.
// ───────────────────────────────────────────────────────────────────────
let soloMode = false;
let aiBots = []; // [{id, slot, color, difficulty, ...controller state}]

document.getElementById('btn-solo').addEventListener('click', () => {
  me.name = (document.querySelector('input[name=name]').value.trim() || 'player');
  localStorage.setItem('pwg_name', me.name);
  startSolo();
});

function startSolo() {
  soloMode = true;
  me.id = 'me';
  me.host = true;
  me.slot = 0;
  // Three named ghosts. No difficulty levels — one tuned planner.
  const roster = [
    { id: 'me', name: me.name, color: me.color, slot: 0 },
    { id: 'ai1', name: 'wraith', color: 1, slot: 1, ai: true },
    { id: 'ai2', name: 'banshee', color: 2, slot: 2, ai: true },
    { id: 'ai3', name: 'phantom', color: 3, slot: 3, ai: true },
  ];
  for (const r of roster) peers.set(r.id, r);
  aiBots = roster.filter(r => r.ai).map(r => ({ ...r, _think: 0, _intent: null }));
  const seed = (Math.random() * 0x7fffffff) | 0;
  initGame(seed, roster);
}

// In solo mode, drive the AI bots from the same loop. Stamp their actions
// the way the network would have stamped them.
const _origUpdate = update;
update = function(dt, t) {
  _origUpdate(dt, t);
  if (!soloMode || endResult) return;
  for (const bot of aiBots) {
    const p = players[bot.id];
    if (!p || !p.alive) continue;
    aiTick(p, bot, dt, t);
  }
};

// ═══════════════════════════════════════════════════════════════════
// Solo AI — full-blown survival-first Bomberman bot.
//
// Design (see README "Bot AI design" for the long version):
//
//   THREAT MODEL. Each existing bomb b will detonate at time t_det = b.fuseUntil
//   and produce fire on aiBlastSet(b) for FIRE_TIME seconds. So each tile
//   covered by b's blast carries a *threat window* [t_det, t_det + FIRE_TIME].
//   Chain reactions are simulated to fixpoint: if bomb A's blast covers
//   bomb B's tile and t_det(A) < t_det(B), then B detonates at A's time.
//   Active fires already on the floor add windows [0, f.until]. A
//   hypothetical bomb (the one we're considering dropping) adds another
//   window with t_det = now + BOMB_FUSE.
//
//   TIME-AWARE BFS. State = (tile, hop). Bot occupies hop-h tile during
//   [now + h*tileTime, now + (h+1)*tileTime] where tileTime depends on
//   the bot's speed tier. A tile is "enterable at hop h" iff none of
//   its threat windows overlap that occupancy interval. A tile is
//   "finally safe at hop h" iff every threat window on it has already
//   ended by arrival — meaning the bot can sit there forever.
//
//   TWO HARD INVARIANTS the bot will not violate:
//     I1. It never STEPS into a tile whose hop-1 occupancy intersects
//         any threat window (planner via aiTileSafeAtHop, hard gate in aiTick).
//     I2. It never DROPS a bomb unless aiTimedEscape(hypoBomb) finds a
//         finally-safe tile reachable in time. So suicide-bombs are
//         structurally impossible.
//
//   PRIORITIES the planner walks, in order:
//     1. flee (in danger now)        → step toward finally-safe tile
//     2. powerup nearby              → take it via timed-safe BFS
//     3. enemy in bomb-line + escape → drop a bomb
//     4. adjacent barrel + escape    → drop a bomb
//     5. nearest barrel              → walk to it via timed-safe BFS
//     6. nearest enemy               → walk to it via timed-safe BFS
//     7. otherwise                   → stand still (idling beats dying)
// ═══════════════════════════════════════════════════════════════════
const AI_THINK_INTERVAL = 0.18;   // seconds between re-plans
const AI_ESCAPE_HOPS    = 12;     // BFS depth for escape / nav
const AI_NAV_HOPS       = 30;     // BFS depth for long-haul barrel/enemy nav

function aiTick(p, bot, dt, t) {
  // Always advance an in-flight step so the bot reaches its next tile.
  if (p.step) { advanceStep(p, dt); return; }
  bot._think -= dt;
  const reachedNewTile = bot._lastTileX !== p.tileX || bot._lastTileY !== p.tileY;
  if (bot._think <= 0 || reachedNewTile || !bot._intent) {
    bot._think = AI_THINK_INTERVAL;
    bot._intent = aiPlanIntent(p);
    bot._lastTileX = p.tileX; bot._lastTileY = p.tileY;
  }
  const tx = p.tileX, ty = p.tileY;
  const want = bot._intent || { dir: null, bomb: false };
  // Drop a candle FIRST (before stepping off this tile) — but only if
  // the planner already verified a timed escape exists (Invariant I2).
  if (want.bomb && p.bombsActive < p.bombs && tileAt(tx, ty) === T_EMPTY && !bombAt(tx, ty)) {
    spawnBomb(p.id, tx, ty, p.power, performance.now() / 1000);
    want.bomb = false;
    // Force an immediate re-plan so the bot heads down its escape route.
    bot._think = 0;
    return;
  }
  // Hard gate (Invariant I1): never step into a tile that's unsafe at hop 1.
  if (want.dir != null) {
    const [dx, dy] = aiDirVec(want.dir);
    if (dx || dy) {
      const ctx = aiBuildThreats(null);
      if (!aiTileSafeAtHop(p.tileX + dx, p.tileY + dy, 1, ctx, aiTileTime(p))) {
        bot._think = 0;
        return;
      }
      if (isSolid(p.tileX + dx, p.tileY + dy, bombAt(p.tileX, p.tileY))) {
        bot._think = 0;
        return;
      }
    }
  }
  aiMove(p, want, dt, bot);
}

function aiDirVec(d) {
  if (d === 0) return [0, -1];
  if (d === 1) return [1, 0];
  if (d === 2) return [0, 1];
  if (d === 3) return [-1, 0];
  return [0, 0];
}
function aiVecToDir(dx, dy) {
  if (dx > 0) return 1;
  if (dx < 0) return 3;
  if (dy > 0) return 2;
  if (dy < 0) return 0;
  return null;
}

// Set of tile keys (y*W+x) burned by a bomb at (bx,by,power); blast
// stops at the first wall/barrel in each cardinal direction.
function aiBlastSet(bx, by, power) {
  const blast = new Set();
  blast.add(by * W + bx);
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    for (let i = 1; i <= power; i++) {
      const x = bx + dx * i, y = by + dy * i;
      if (x < 0 || y < 0 || x >= W || y >= H) break;
      const t = tileAt(x, y);
      if (t === T_WALL) break;
      blast.add(y * W + x);
      if (t === T_BARREL) break;
    }
  }
  return blast;
}

// Build a threat map: tileKey -> array of [t0,t1] danger windows.
// Folds in: existing fused bombs (with chain-reaction propagation),
// active fires, and an optional hypothetical bomb the planner is
// considering. `hypoBomb` is {tx,ty,power} | null.
function aiBuildThreats(hypoBomb) {
  const now = performance.now() / 1000;
  const list = bombs.map(b => ({ tx: b.tx, ty: b.ty, power: b.power, t: b.fuseUntil }));
  if (hypoBomb) list.push({ tx: hypoBomb.tx, ty: hypoBomb.ty, power: hypoBomb.power, t: now + BOMB_FUSE });
  // Chain reaction: bomb whose blast covers another bomb's tile pulls
  // that other bomb's detonation time down. Iterate to fixpoint.
  let changed = true, guard = 0;
  while (changed && guard++ < 8) {
    changed = false;
    for (const b of list) {
      const blast = aiBlastSet(b.tx, b.ty, b.power);
      for (const c of list) {
        if (c === b) continue;
        if (blast.has(c.ty * W + c.tx) && c.t > b.t + 1e-4) {
          c.t = b.t;
          changed = true;
        }
      }
    }
  }
  const threats = new Map();
  const add = (k, t0, t1) => {
    let arr = threats.get(k);
    if (!arr) { arr = []; threats.set(k, arr); }
    arr.push([t0, t1]);
  };
  for (const b of list) {
    const blast = aiBlastSet(b.tx, b.ty, b.power);
    for (const k of blast) add(k, b.t, b.t + FIRE_TIME);
  }
  for (const f of fires) add(f.ty * W + f.tx, 0, f.until);
  return { threats, now };
}

function aiTileTime(p) { return 1 / (BASE_SPEED + p.speedTier * SPEED_STEP); }

// Is (tx,ty) safe to OCCUPY at hop h? (occupancy = [arrival, arrival+tileTime])
function aiTileSafeAtHop(tx, ty, hop, ctx, tileTime) {
  const wins = ctx.threats.get(ty * W + tx);
  if (!wins) return true;
  const a = ctx.now + hop * tileTime;
  const b = ctx.now + (hop + 1) * tileTime;
  for (const w of wins) {
    if (!(b <= w[0] || a >= w[1])) return false;
  }
  return true;
}

// Is (tx,ty) "finally safe" — i.e., after arrival no future threat
// will cover it, so the bot can stop there and live?
function aiTileFinallySafe(tx, ty, hop, ctx, tileTime) {
  const wins = ctx.threats.get(ty * W + tx);
  if (!wins) return true;
  const arrival = ctx.now + hop * tileTime;
  for (const w of wins) {
    if (w[1] > arrival + 1e-4) return false;
  }
  return true;
}

// Time-aware escape BFS. Returns {dir} of the first step on the path
// to the nearest tile that's finally-safe, or null if no escape exists
// within maxHops. If `hypoBomb` is provided, threats include it.
function aiTimedEscape(p, hypoBomb, maxHops) {
  const ctx = aiBuildThreats(hypoBomb);
  const tileTime = aiTileTime(p);
  const ig = bombAt(p.tileX, p.tileY);
  const startK = p.tileY * W + p.tileX;
  const seen = new Uint8Array(W * H);
  seen[startK] = 1;
  let frontier = [{ k: startK, hop: 0, firstDir: -1 }];
  let depth = 0;
  while (frontier.length && depth < maxHops) {
    const next = [];
    for (const node of frontier) {
      const x = node.k % W, y = (node.k / W) | 0;
      if (node.firstDir >= 0 && aiTileFinallySafe(x, y, node.hop, ctx, tileTime)) {
        return { dir: node.firstDir };
      }
      for (let d = 0; d < 4; d++) {
        const v = aiDirVec(d);
        const nx = x + v[0], ny = y + v[1];
        if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
        if (isSolid(nx, ny, ig)) continue;
        const nk = ny * W + nx;
        if (seen[nk]) continue;
        if (!aiTileSafeAtHop(nx, ny, node.hop + 1, ctx, tileTime)) continue;
        seen[nk] = 1;
        next.push({ k: nk, hop: node.hop + 1, firstDir: node.firstDir < 0 ? d : node.firstDir });
      }
    }
    frontier = next;
    depth++;
  }
  return null;
}

// Verify: if we drop a bomb HERE right now, can we still escape?
function aiCanBomb(p) {
  return aiTimedEscape(p, { tx: p.tileX, ty: p.tileY, power: p.power }, AI_ESCAPE_HOPS) != null;
}

// Are we in immediate danger? (current tile occupied during a threat window)
function aiInDangerNow(p) {
  const ctx = aiBuildThreats(null);
  return !aiTileSafeAtHop(p.tileX, p.tileY, 0, ctx, aiTileTime(p));
}

// Time-aware navigation: BFS for first step toward any tile satisfying
// goalFn(x,y), refusing to enter tiles unsafe at the corresponding hop.
function aiSafeNavStep(p, goalFn, maxHops) {
  const ctx = aiBuildThreats(null);
  const tileTime = aiTileTime(p);
  const ig = bombAt(p.tileX, p.tileY);
  const startK = p.tileY * W + p.tileX;
  const seen = new Uint8Array(W * H);
  seen[startK] = 1;
  let frontier = [{ k: startK, hop: 0, firstDir: -1 }];
  let depth = 0;
  while (frontier.length && depth < maxHops) {
    const next = [];
    for (const node of frontier) {
      const x = node.k % W, y = (node.k / W) | 0;
      if (node.firstDir >= 0 && goalFn(x, y)) return { dir: node.firstDir };
      for (let d = 0; d < 4; d++) {
        const v = aiDirVec(d);
        const nx = x + v[0], ny = y + v[1];
        if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
        if (isSolid(nx, ny, ig)) continue;
        const nk = ny * W + nx;
        if (seen[nk]) continue;
        if (!aiTileSafeAtHop(nx, ny, node.hop + 1, ctx, tileTime)) continue;
        seen[nk] = 1;
        next.push({ k: nk, hop: node.hop + 1, firstDir: node.firstDir < 0 ? d : node.firstDir });
      }
    }
    frontier = next;
    depth++;
  }
  return null;
}

function aiPlanIntent(p) {
  const tx = p.tileX, ty = p.tileY;

  // 1. In danger? Run.
  if (aiInDangerNow(p)) {
    const flee = aiTimedEscape(p, null, AI_ESCAPE_HOPS);
    if (flee && flee.dir != null) return { dir: flee.dir, bomb: false };
    // Truly cornered — twitch into any open neighbour rather than freeze.
    for (let d = 0; d < 4; d++) {
      const v = aiDirVec(d);
      if (!isSolid(tx + v[0], ty + v[1], bombAt(tx, ty))) return { dir: d, bomb: false };
    }
    return { dir: null, bomb: false };
  }

  // 2. Powerup within reach via a safe path → grab it.
  if (powerups.length) {
    const toPow = aiSafeNavStep(p, (x, y) => {
      for (const pu of powerups) if (pu.tx === x && pu.ty === y) return true;
      return false;
    }, AI_NAV_HOPS);
    if (toPow) return { dir: toPow.dir, bomb: false };
  }

  // 3. Enemy in bomb-line + verified escape → bomb.
  if (p.bombsActive < p.bombs) {
    for (const id in players) {
      const e = players[id];
      if (!e.alive || e.id === p.id) continue;
      const ex = e.tileX, ey = e.tileY;
      if (ex === tx && ey === ty) continue;
      if (ex !== tx && ey !== ty) continue;
      const dist = Math.abs(ex - tx) + Math.abs(ey - ty);
      if (dist > p.power) continue;
      let blocked = false;
      if (ex === tx) {
        const a = Math.min(ey, ty), c = Math.max(ey, ty);
        for (let yy = a + 1; yy < c; yy++) {
          const t2 = tileAt(tx, yy);
          if (t2 === T_WALL || t2 === T_BARREL) { blocked = true; break; }
        }
      } else {
        const a = Math.min(ex, tx), c = Math.max(ex, tx);
        for (let xx = a + 1; xx < c; xx++) {
          const t2 = tileAt(xx, ty);
          if (t2 === T_WALL || t2 === T_BARREL) { blocked = true; break; }
        }
      }
      if (!blocked && aiCanBomb(p)) return { dir: null, bomb: true };
    }
  }

  // 4. Adjacent barrel + verified escape → bomb.
  if (p.bombsActive < p.bombs) {
    let touching = false;
    for (let d = 0; d < 4; d++) {
      const v = aiDirVec(d);
      if (tileAt(tx + v[0], ty + v[1]) === T_BARREL) { touching = true; break; }
    }
    if (touching && aiCanBomb(p)) return { dir: null, bomb: true };
  }

  // 5. Walk toward the nearest barrel-adjacent tile via safe path.
  const toBarrel = aiSafeNavStep(p, (x, y) => {
    for (let d = 0; d < 4; d++) {
      const v = aiDirVec(d);
      if (tileAt(x + v[0], y + v[1]) === T_BARREL) return true;
    }
    return false;
  }, AI_NAV_HOPS);
  if (toBarrel) return { dir: toBarrel.dir, bomb: false };

  // 6. Walk toward nearest enemy via safe path.
  const enemies = [];
  for (const id in players) {
    const e = players[id];
    if (e.alive && e.id !== p.id) enemies.push(e);
  }
  if (enemies.length) {
    const toEnemy = aiSafeNavStep(p, (x, y) => {
      for (const e of enemies) if (e.tileX === x && e.tileY === y) return true;
      return false;
    }, AI_NAV_HOPS);
    if (toEnemy) return { dir: toEnemy.dir, bomb: false };
  }

  // 7. Idle.
  return { dir: null, bomb: false };
}

// AI driver: walk along the planned intent, one tile at a time. The
// step model handles the animation; this function just decides when to
// initiate the next step.
function aiMove(p, want, dt, bot) {
  advanceStep(p, dt);
  if (p.step) return;
  if (!want || want.dir == null) return;
  let dx = 0, dy = 0;
  if (want.dir === 0) dy = -1;
  else if (want.dir === 1) dx = 1;
  else if (want.dir === 2) dy = 1;
  else if (want.dir === 3) dx = -1;
  if (!dx && !dy) return;
  startStep(p, dx, dy);
}

// In solo mode, the rematch button restarts with fresh seed & roster.
const _origRematch = document.getElementById('btn-rematch').onclick;
document.getElementById('btn-rematch').addEventListener('click', () => {
  if (!soloMode) return;
  startSolo();
});
const _origBack = document.getElementById('btn-back').onclick;
document.getElementById('btn-back').addEventListener('click', () => {
  if (soloMode) {
    soloMode = false;
    aiBots = [];
    peers.clear();
    showLobby();
  }
});

// Sudden-death tempo nudge: when fewer wisps remain or a death occurs,
// the chiptune speeds up gently. Hooked into checkEnd via wrapper.
const _origCheckEnd = checkEnd;
checkEnd = function() {
  _origCheckEnd();
  const alive = players ? Object.values(players).filter(p => p.alive).length : 0;
  if (alive <= 2) AudioEngine.setTempo(1.25);
  else AudioEngine.setTempo(1.0);
};

// Pause music on tab hidden.
document.addEventListener('visibilitychange', () => {
  // Engine already gates on document.hidden in tickBeat.
});

// Reconnect persistence (light): remember last room+name in sessionStorage.
// If the user reloads within 30s, the auto-join will reconnect.
// ───────────────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  if (pendingRoom) sessionStorage.setItem('pwg_last_room', pendingRoom);
});
const lastRoom = sessionStorage.getItem('pwg_last_room');
if (lastRoom && !autoCode && !soloMode) {
  // Don't auto-rejoin silently; surface a one-click hint.
  const hint = document.getElementById('status');
  if (hint) {
    hint.innerHTML = '';
    const a = document.createElement('a');
    a.href = `/games/pwg/?room=${lastRoom}`;
    a.textContent = `rejoin ${lastRoom}?`;
    a.style.cssText = 'color:var(--accent2);text-decoration:underline;cursor:pointer';
    hint.appendChild(a);
  }
}
