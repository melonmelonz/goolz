<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scry — Workbench</title>
<meta name="description" content="Scry takes a binary and shows you what it would do, without leaving your browser tab.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23f6f1e8'/%3E%3Crect y='6' width='16' height='4' fill='%23a8e0c8'/%3E%3C/svg%3E">
<script>
  // v1 was a separate vanilla-JS SPA. It drifted from v2 (Svelte+WASM) in
  // ways that the demo cares about (no PC follow, broken big-cart layout,
  // identical-looking UI that wasn't actually identical). Until a clean
  // vanilla-JS rewrite mirrors v2 1-to-1, both /scry/v1/ and /scry/v2/
  // serve the v2 bundle. The parent shell's v1/v2 toggle still works —
  // the iframe just lands on the same surface from both sides.
  var qs = location.search || '';
  var hs = location.hash || '';
  location.replace('../v2/' + qs + hs);
</script>
</head>

</html>
