<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>scry — binary workbench</title>
<meta name="description" content="Scry takes a binary and shows you what it would do, without leaving your browser tab.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23f6f1e8'/%3E%3Crect y='6' width='16' height='4' fill='%23a8e0c8'/%3E%3C/svg%3E">
<link rel="stylesheet" href="tokens.css">
<style>
html { color-scheme: light dark; accent-color: var(--mint-deep); }
::selection { background: var(--mint-deep); color: var(--paper); }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--ink);
  font-size: 12px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--mint-deep);
  z-index: 100;
  pointer-events: none;
  transform-origin: left center;
}
body.boot-stripe::before {
  transform: scaleX(0);
  animation: stripe-wipe 600ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
}
@keyframes stripe-wipe {
  to { transform: scaleX(1); }
}

/* Top chrome ----------------------------------------------------------- */
.chrome {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--ink);
  background: var(--bg);
}
.brand { font-weight: 600; font-size: 13px; letter-spacing: 0.04em; }
.brand::before { content: '\25C6 '; color: var(--mint-deep); font-size: 11px; }
.tag {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.spacer { flex: 1; }

.modes { display: flex; gap: 6px; }
.mode {
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 5px 12px;
  cursor: pointer;
  transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
}
.mode { position: relative; }
.mode:hover { color: var(--ink); border-color: var(--mint-deep); }
.mode.on {
  color: var(--mint-deep);
  border-color: var(--mint-deep);
  background: var(--paper);
}
.mode.on::after {
  content: '';
  position: absolute;
  left: 8px; right: 8px;
  bottom: -1px;
  height: 2px;
  background: var(--mint-deep);
}
.mode .sub { color: var(--muted); margin-left: 6px; letter-spacing: 0.06em; }
.mode.on .sub { color: var(--mint-deep); }

.demo-btn {
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mint-deep);
  background: transparent;
  border: 1px solid var(--mint-deep);
  padding: 5px 12px;
  cursor: pointer;
  transition: color 120ms ease, background 120ms ease;
}
.demo-btn::before {
  content: '\25B6';
  margin-right: 6px;
  font-size: 8px;
  vertical-align: 1px;
}
.demo-btn:hover { color: var(--paper); background: var(--mint-deep); }

.scope-link {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mint-deep);
  text-decoration: none;
  border: 1px solid var(--rule);
  padding: 5px 10px;
  transition: border-color 120ms ease, background 120ms ease;
}
.scope-link:hover { border-color: var(--mint-deep); background: var(--mint-pale); }

.theme-toggle {
  font-family: inherit;
  font-size: 13px;
  line-height: 1;
  color: var(--mint-deep);
  background: transparent;
  border: 1px solid var(--rule);
  width: 28px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  position: relative;
  overflow: hidden;
  transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
}
.theme-toggle:hover {
  color: var(--ink);
  border-color: var(--mint-deep);
  background: var(--mint-pale);
}
.theme-toggle .icon {
  position: absolute;
  top: 50%;
  left: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transform: translate(-50%, -50%) rotate(-30deg);
  opacity: 0;
  transition: opacity 200ms ease, transform 240ms ease;
  pointer-events: none;
  line-height: 1;
}
.theme-toggle .icon.on {
  opacity: 1;
  transform: translate(-50%, -50%) rotate(0deg);
}

/* Frame area ----------------------------------------------------------- */
.frame {
  flex: 1;
  min-height: 0;
  position: relative;
}
iframe.surface {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t-swap);
}
iframe.surface.ready {
  opacity: 1;
  pointer-events: auto;
}

/* Footer --------------------------------------------------------------- */
.foot {
  display: flex;
  justify-content: space-between;
  padding: 8px 22px;
  border-top: 1px solid var(--grey);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
}
.foot a { color: var(--muted); text-decoration: none; }
.foot a:hover { color: var(--mint-deep); }

/* Mobile chrome --------------------------------------------------------- */
@media (max-width: 760px) {
  .chrome {
    flex-wrap: wrap;
    gap: 10px 14px;
    padding: 10px 14px;
  }
  .chrome .tag { display: none; }
  .scope-link, .theme-toggle { padding: 5px 10px; font-size: 9px; }
  .modes { order: -1; }
  .foot { padding: 8px 14px; font-size: 8px; }
}
</style>
<script>
  // Pre-paint theme so the chrome and the iframe agree on a palette
  // before the first frame.
  try {
    var t = localStorage.getItem('scry-theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
</script>
</head>
<body>

<header class="chrome">
  <span class="brand">scry</span>
  <span class="tag">binary workbench &middot; v0.1</span>

  <span class="spacer"></span>

  <div class="modes" role="tablist" aria-label="Engine">
    <button class="mode" id="mode-v1" role="tab" aria-controls="surface" type="button">
      V1<span class="sub">PURE</span>
    </button>
    <button class="mode" id="mode-v2" role="tab" aria-controls="surface" type="button">
      V2<span class="sub">RUST&middot;WASM</span>
    </button>
  </div>

  <a class="scope-link" href="scope.html">Scope &amp; wireframes &rarr;</a>
  <a class="scope-link" href="breakdown.html">Tech breakdown &rarr;</a>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">
    <span class="icon" id="icon-moon" aria-hidden="true">&#x263E;</span>
    <span class="icon" id="icon-sun" aria-hidden="true">&#x263C;</span>
  </button>
</header>

<main class="frame">
  <iframe class="surface" id="surface-a" title="scry workbench"></iframe>
  <iframe class="surface" id="surface-b" title="scry workbench" aria-hidden="true"></iframe>
</main>

<footer class="foot">
  <span>LOCAL &middot; NO UPLOAD &middot; NO LOGIN</span>
  <span><a href="https://github.com/melonmelonz/scry">github.com/melonmelonz/scry</a></span>
  <span>2026</span>
</footer>

<script>
(function () {
  var KEY      = 'scry-theme';
  var MODEKEY  = 'scry-mode';
  var BOOTKEY  = 'scry-shell-booted';
  var slotA    = document.getElementById('surface-a');
  var slotB    = document.getElementById('surface-b');
  var btnV1    = document.getElementById('mode-v1');
  var btnV2    = document.getElementById('mode-v2');
  var btnT     = document.getElementById('theme-toggle');
  var iconMoon = document.getElementById('icon-moon');
  var iconSun  = document.getElementById('icon-sun');
  var mq       = window.matchMedia('(prefers-color-scheme: dark)');

  var currentMode = null;          // 'v1' | 'v2' | null
  var activeSlot  = slotA;         // the slot currently visible

  // --- mint stripe boot wipe (once per session) ---------------------
  try {
    if (!sessionStorage.getItem(BOOTKEY)) {
      document.body.classList.add('boot-stripe');
      sessionStorage.setItem(BOOTKEY, '1');
    }
  } catch (e) {}

  // --- helpers ------------------------------------------------------
  function visibleSlot() {
    // The slot that is currently meant to be visible (matches currentMode).
    if (slotA.getAttribute('data-mode') === currentMode) return slotA;
    if (slotB.getAttribute('data-mode') === currentMode) return slotB;
    return activeSlot;
  }
  function postToVisible(msg) {
    var s = visibleSlot();
    try {
      s && s.contentWindow && s.contentWindow.postMessage(msg, location.origin);
    } catch (e) {}
  }

  // --- mode ---------------------------------------------------------
  // URL hash wins, then localStorage, then default.
  function readMode() {
    var h = (location.hash || '').replace(/^#/, '');
    if (h === 'v1' || h === 'v2') return h;
    var s = null;
    try { s = localStorage.getItem(MODEKEY); } catch (e) {}
    if (s === 'v1' || s === 'v2') return s;
    return 'v2';
  }

  function setMode(m) {
    if (m !== 'v1' && m !== 'v2') return;
    try { localStorage.setItem(MODEKEY, m); } catch (e) {}
    if (location.hash !== '#' + m) {
      history.replaceState(null, '', '#' + m);
    }
    btnV1.classList.toggle('on', m === 'v1');
    btnV2.classList.toggle('on', m === 'v2');
    btnV1.setAttribute('aria-selected', m === 'v1' ? 'true' : 'false');
    btnV2.setAttribute('aria-selected', m === 'v2' ? 'true' : 'false');

    if (currentMode === m && activeSlot.getAttribute('data-mode') === m) return;

    // ?embed=1 lets v1/v2 hide their own brand + theme toggle so we don't
    // get double chrome.
    var target = m + '/?embed=1';

    // Pick the inactive slot to mount the new engine in.
    var incoming = (activeSlot === slotA) ? slotB : slotA;
    var outgoing = activeSlot;

    incoming.setAttribute('data-mode', m);
    // Only set src if it isn't already pointing at this engine.
    if (incoming.getAttribute('data-target') !== target) {
      incoming.setAttribute('data-target', target);
      incoming.src = target;
    } else {
      // Already loaded — just bring it up.
      incoming.classList.add('ready');
    }
    incoming.setAttribute('aria-hidden', 'false');

    // Fade out the previous frame in parallel.
    if (outgoing !== incoming && outgoing.getAttribute('data-mode')) {
      outgoing.classList.remove('ready');
      outgoing.setAttribute('aria-hidden', 'true');
      var stale = outgoing;
      // After the crossfade completes, drop its src so it stops running.
      setTimeout(function () {
        // Guard: only unload if it's still the outgoing slot.
        if (stale !== activeSlot) {
          try { stale.removeAttribute('src'); } catch (e) {}
          stale.removeAttribute('data-mode');
          stale.removeAttribute('data-target');
        }
      }, 250);
    }

    activeSlot  = incoming;
    currentMode = m;
  }

  btnV1.addEventListener('click', function () { setMode('v1'); });
  btnV2.addEventListener('click', function () { setMode('v2'); });
  window.addEventListener('hashchange', function () { setMode(readMode()); });

  // --- theme --------------------------------------------------------
  function currentTheme() {
    var a = document.documentElement.getAttribute('data-theme');
    if (a === 'light' || a === 'dark') return a;
    return mq.matches ? 'dark' : 'light';
  }
  function renderToggle() {
    var t = currentTheme();
    // In dark mode, show the sun (so the user can switch to light).
    // In light mode, show the moon.
    var darkActive = (t === 'dark');
    iconSun.classList.toggle('on',  darkActive);
    iconMoon.classList.toggle('on', !darkActive);
    btnT.title = darkActive ? 'Switch to light' : 'Switch to dark';
    btnT.setAttribute('aria-label', darkActive ? 'Switch to light mode' : 'Switch to dark mode');
  }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem(KEY, t); } catch (e) {}
    // Push to the visible iframe so it doesn't have to wait for a reload.
    postToVisible({ type: 'scry-theme', value: t });
    renderToggle();
  }
  btnT.addEventListener('click', function () {
    applyTheme(currentTheme() === 'dark' ? 'light' : 'dark');
  });
  mq.addEventListener('change', function () {
    if (!document.documentElement.hasAttribute('data-theme')) renderToggle();
  });

  // On iframe load, sync current theme into it (it has its own pre-paint
  // script but a freshly mounted iframe may have raced us).
  function onSlotLoad(slot) {
    return function () {
      if (!slot.getAttribute('data-mode')) return;
      slot.classList.add('ready');
      try {
        slot.contentWindow && slot.contentWindow.postMessage(
          { type: 'scry-theme', value: currentTheme() },
          location.origin
        );
      } catch (e) {}
    };
  }
  slotA.addEventListener('load', onSlotLoad(slotA));
  slotB.addEventListener('load', onSlotLoad(slotB));

  // --- boot ---------------------------------------------------------
  renderToggle();
  setMode(readMode());
})();
</script>
</body>
</html>
