<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>scry — binary workbench</title>
<meta name="description" content="Scry takes a binary and shows you what it would do, without leaving your browser tab.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F2F1EC;
  --paper:     #FAF8F2;
  --grey:      #DEDDD7;
  --rule:      #C7C5BF;
  --ink:       #1F2421;
  --muted:     #8A8E87;
  --mint:      #A6C9B5;
  --mint-deep: #5E957A;
  --mint-pale: #E2EEE7;
  --mono: 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
  color-scheme: light;
}
[data-theme="dark"] {
  --bg:        #14171A;
  --paper:     #1B1F23;
  --grey:      #2A2F33;
  --rule:      #3B4146;
  --ink:       #E8E7E1;
  --muted:     #8A8E87;
  --mint:      #6B9F84;
  --mint-deep: #8FC2A8;
  --mint-pale: #243A30;
  color-scheme: dark;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg:        #14171A;
    --paper:     #1B1F23;
    --grey:      #2A2F33;
    --rule:      #3B4146;
    --ink:       #E8E7E1;
    --muted:     #8A8E87;
    --mint:      #6B9F84;
    --mint-deep: #8FC2A8;
    --mint-pale: #243A30;
    color-scheme: dark;
  }
}
html { color-scheme: light dark; accent-color: var(--mint-deep); }
::selection { background: var(--mint-deep); color: var(--paper); }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--ink);
  font-size: 12px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--mint-deep);
  z-index: 100;
  pointer-events: none;
}

/* Top chrome ----------------------------------------------------------- */
.chrome {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--ink);
  background: var(--bg);
}
.brand { font-weight: 600; font-size: 13px; letter-spacing: 0.04em; }
.brand::before { content: '\25C6 '; color: var(--mint-deep); font-size: 11px; }
.tag {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.spacer { flex: 1; }

.modes { display: flex; gap: 6px; }
.mode {
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 5px 12px;
  cursor: pointer;
  transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
}
.mode:hover { color: var(--ink); border-color: var(--mint-deep); }
.mode.on {
  color: var(--mint-deep);
  border-color: var(--mint-deep);
  background: var(--mint-pale);
}
.mode .sub { color: var(--muted); margin-left: 6px; letter-spacing: 0.06em; }
.mode.on .sub { color: var(--mint-deep); }

.scope-link {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mint-deep);
  text-decoration: none;
  border: 1px solid var(--rule);
  padding: 5px 10px;
  transition: border-color 120ms ease, background 120ms ease;
}
.scope-link:hover { border-color: var(--mint-deep); background: var(--mint-pale); }

.theme-toggle {
  font-family: inherit;
  font-size: 13px;
  line-height: 1;
  color: var(--mint-deep);
  background: transparent;
  border: 1px solid var(--rule);
  width: 28px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
}
.theme-toggle:hover {
  color: var(--ink);
  border-color: var(--mint-deep);
  background: var(--mint-pale);
}

/* Frame area ----------------------------------------------------------- */
.frame {
  flex: 1;
  min-height: 0;
  position: relative;
}
iframe.surface {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: var(--bg);
}

/* Footer --------------------------------------------------------------- */
.foot {
  display: flex;
  justify-content: space-between;
  padding: 8px 22px;
  border-top: 1px solid var(--grey);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
}
.foot a { color: var(--muted); text-decoration: none; }
.foot a:hover { color: var(--mint-deep); }
</style>
<script>
  // Pre-paint theme so the chrome and the iframe agree on a palette
  // before the first frame.
  try {
    var t = localStorage.getItem('scry-theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
</script>
</head>
<body>

<header class="chrome">
  <span class="brand">scry</span>
  <span class="tag">binary workbench &middot; v0.1</span>

  <span class="spacer"></span>

  <div class="modes" role="tablist" aria-label="Engine">
    <button class="mode" id="mode-v1" role="tab" aria-controls="surface" type="button">
      V1<span class="sub">PURE</span>
    </button>
    <button class="mode" id="mode-v2" role="tab" aria-controls="surface" type="button">
      V2<span class="sub">RUST&middot;WASM</span>
    </button>
  </div>

  <a class="scope-link" href="scope.html">Scope &amp; wireframes &rarr;</a>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">&#x263E;</button>
</header>

<main class="frame">
  <iframe class="surface" id="surface" title="scry workbench"></iframe>
</main>

<footer class="foot">
  <span>LOCAL &middot; NO UPLOAD &middot; NO LOGIN</span>
  <span><a href="https://github.com/melonmelonz/scry">github.com/melonmelonz/scry</a></span>
  <span>2026</span>
</footer>

<script>
(function () {
  var KEY     = 'scry-theme';
  var MODEKEY = 'scry-mode';
  var iframe  = document.getElementById('surface');
  var btnV1   = document.getElementById('mode-v1');
  var btnV2   = document.getElementById('mode-v2');
  var btnT    = document.getElementById('theme-toggle');
  var mq      = window.matchMedia('(prefers-color-scheme: dark)');

  // --- mode ---------------------------------------------------------
  // URL hash wins, then localStorage, then default.
  function readMode() {
    var h = (location.hash || '').replace(/^#/, '');
    if (h === 'v1' || h === 'v2') return h;
    var s = null;
    try { s = localStorage.getItem(MODEKEY); } catch (e) {}
    if (s === 'v1' || s === 'v2') return s;
    return 'v2';
  }

  function setMode(m) {
    if (m !== 'v1' && m !== 'v2') return;
    try { localStorage.setItem(MODEKEY, m); } catch (e) {}
    if (location.hash !== '#' + m) {
      history.replaceState(null, '', '#' + m);
    }
    btnV1.classList.toggle('on', m === 'v1');
    btnV2.classList.toggle('on', m === 'v2');
    // ?embed=1 lets v1/v2 hide their own brand + theme toggle so we don't
    // get double chrome.
    var target = m + '/?embed=1';
    if (iframe.getAttribute('data-mode') !== m) {
      iframe.setAttribute('data-mode', m);
      iframe.src = target;
    }
  }

  btnV1.addEventListener('click', function () { setMode('v1'); });
  btnV2.addEventListener('click', function () { setMode('v2'); });
  window.addEventListener('hashchange', function () { setMode(readMode()); });

  // --- theme --------------------------------------------------------
  function currentTheme() {
    var a = document.documentElement.getAttribute('data-theme');
    if (a === 'light' || a === 'dark') return a;
    return mq.matches ? 'dark' : 'light';
  }
  function renderToggle() {
    var t = currentTheme();
    btnT.textContent = t === 'dark' ? '\u263C' : '\u263E';
    btnT.title = t === 'dark' ? 'Switch to light' : 'Switch to dark';
  }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem(KEY, t); } catch (e) {}
    // Push to the iframe so it doesn't have to wait for a reload.
    try {
      iframe.contentWindow &&
        iframe.contentWindow.postMessage({ type: 'scry-theme', value: t }, location.origin);
    } catch (e) {}
    renderToggle();
  }
  btnT.addEventListener('click', function () {
    applyTheme(currentTheme() === 'dark' ? 'light' : 'dark');
  });
  mq.addEventListener('change', function () {
    if (!document.documentElement.hasAttribute('data-theme')) renderToggle();
  });

  // On iframe load, sync current theme into it (it has its own pre-paint
  // script but a freshly mounted iframe may have raced us).
  iframe.addEventListener('load', function () {
    try {
      iframe.contentWindow.postMessage(
        { type: 'scry-theme', value: currentTheme() },
        location.origin
      );
    } catch (e) {}
  });

  // --- boot ---------------------------------------------------------
  renderToggle();
  setMode(readMode());
})();
</script>
</body>
</html>
