<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <!-- IMOTEKH THE STORMLORD — pixel sprite, 4-color Game Boy palette
       palette: #9bbc0f light · #8bac0f mid · #306230 dark · #0f380f darkest -->
  <rect width="64" height="64" fill="#9bbc0f"/>

  <!-- ── distant lightning sky ── -->
  <polygon points="6,3 10,8 8,9 12,16 9,15 11,20 8,18 9,16 5,11 7,10 4,7" fill="#306230"/>
  <polygon points="55,4 58,9 56,10 60,16 57,15 59,21 56,19 57,17 53,12 55,11 52,7" fill="#306230"/>

  <!-- ── crown — 5 tall spires, center tallest ── -->
  <rect x="31" y="0"  width="2" height="11" fill="#0f380f"/>
  <rect x="32" y="0"  width="1" height="11" fill="#306230"/>
  <rect x="22" y="3"  width="2" height="8"  fill="#0f380f"/>
  <rect x="23" y="3"  width="1" height="8"  fill="#306230"/>
  <rect x="40" y="3"  width="2" height="8"  fill="#0f380f"/>
  <rect x="41" y="3"  width="1" height="8"  fill="#306230"/>
  <rect x="14" y="6"  width="2" height="5"  fill="#0f380f"/>
  <rect x="48" y="6"  width="2" height="5"  fill="#0f380f"/>

  <!-- crown band -->
  <rect x="13" y="11" width="38" height="5" fill="#306230"/>
  <rect x="13" y="11" width="38" height="1" fill="#0f380f"/>
  <rect x="13" y="15" width="38" height="1" fill="#0f380f"/>
  <rect x="13" y="11" width="1"  height="5" fill="#0f380f"/>
  <rect x="50" y="11" width="1"  height="5" fill="#0f380f"/>
  <!-- band gems -->
  <rect x="17" y="13" width="2" height="2" fill="#8bac0f"/>
  <rect x="23" y="13" width="2" height="2" fill="#8bac0f"/>
  <rect x="29" y="13" width="6" height="2" fill="#8bac0f"/>
  <rect x="30" y="13" width="4" height="2" fill="#0f380f"/>
  <rect x="39" y="13" width="2" height="2" fill="#8bac0f"/>
  <rect x="45" y="13" width="2" height="2" fill="#8bac0f"/>

  <!-- ── skull face ── -->
  <!-- skull background -->
  <rect x="17" y="16" width="30" height="22" fill="#306230"/>
  <!-- skull outline -->
  <rect x="17" y="16" width="30" height="1"  fill="#0f380f"/>
  <rect x="16" y="17" width="1"  height="20" fill="#0f380f"/>
  <rect x="47" y="17" width="1"  height="20" fill="#0f380f"/>
  <rect x="18" y="37" width="28" height="1"  fill="#0f380f"/>
  <!-- forehead crest -->
  <rect x="30" y="17" width="4" height="1" fill="#8bac0f"/>
  <rect x="31" y="17" width="2" height="2" fill="#8bac0f"/>

  <!-- eye sockets — black recess -->
  <rect x="20" y="20" width="9" height="6" fill="#0f380f"/>
  <rect x="35" y="20" width="9" height="6" fill="#0f380f"/>
  <!-- glowing eyes — bright green -->
  <rect x="22" y="22" width="5" height="2" fill="#8bac0f"/>
  <rect x="37" y="22" width="5" height="2" fill="#8bac0f"/>
  <rect x="23" y="22" width="3" height="2" fill="#9bbc0f"/>
  <rect x="38" y="22" width="3" height="2" fill="#9bbc0f"/>
  <!-- eye glow streaks -->
  <rect x="22" y="24" width="5" height="1" fill="#306230"/>
  <rect x="37" y="24" width="5" height="1" fill="#306230"/>

  <!-- nose / vent -->
  <rect x="31" y="27" width="2" height="4" fill="#0f380f"/>
  <rect x="30" y="29" width="4" height="1" fill="#0f380f"/>

  <!-- mouth — teeth grid -->
  <rect x="22" y="33" width="20" height="4" fill="#0f380f"/>
  <rect x="24" y="34" width="2" height="2" fill="#306230"/>
  <rect x="28" y="34" width="2" height="2" fill="#306230"/>
  <rect x="32" y="34" width="2" height="2" fill="#306230"/>
  <rect x="36" y="34" width="2" height="2" fill="#306230"/>

  <!-- cheek scars / glyphs -->
  <rect x="18" y="28" width="2" height="1" fill="#0f380f"/>
  <rect x="18" y="30" width="3" height="1" fill="#0f380f"/>
  <rect x="44" y="28" width="2" height="1" fill="#0f380f"/>
  <rect x="43" y="30" width="3" height="1" fill="#0f380f"/>

  <!-- ── neck / gorget ── -->
  <rect x="26" y="38" width="12" height="3" fill="#0f380f"/>
  <rect x="27" y="39" width="10" height="1" fill="#306230"/>

  <!-- ── pauldrons / shoulders ── -->
  <rect x="6"  y="41" width="52" height="8" fill="#306230"/>
  <rect x="6"  y="40" width="52" height="1" fill="#0f380f"/>
  <rect x="6"  y="49" width="52" height="1" fill="#0f380f"/>
  <rect x="6"  y="41" width="1"  height="8" fill="#0f380f"/>
  <rect x="57" y="41" width="1"  height="8" fill="#0f380f"/>
  <!-- pauldron rivets -->
  <rect x="9"  y="44" width="2" height="2" fill="#0f380f"/>
  <rect x="14" y="44" width="2" height="2" fill="#0f380f"/>
  <rect x="19" y="44" width="2" height="2" fill="#0f380f"/>
  <rect x="43" y="44" width="2" height="2" fill="#0f380f"/>
  <rect x="48" y="44" width="2" height="2" fill="#0f380f"/>
  <rect x="53" y="44" width="2" height="2" fill="#0f380f"/>

  <!-- pauldron highlight strip -->
  <rect x="8"  y="42" width="14" height="1" fill="#8bac0f"/>
  <rect x="42" y="42" width="14" height="1" fill="#8bac0f"/>

  <!-- ── chest plate ── -->
  <rect x="22" y="50" width="20" height="14" fill="#306230"/>
  <rect x="22" y="50" width="20" height="1"  fill="#0f380f"/>
  <rect x="22" y="50" width="1"  height="14" fill="#0f380f"/>
  <rect x="41" y="50" width="1"  height="14" fill="#0f380f"/>
  <!-- chest highlight -->
  <rect x="24" y="51" width="6" height="1" fill="#8bac0f"/>

  <!-- Necron triangle insignia -->
  <polygon points="32,53 26,62 38,62" fill="#0f380f"/>
  <polygon points="32,55 28,61 36,61" fill="#8bac0f"/>
  <polygon points="32,57 30,60 34,60" fill="#0f380f"/>

  <!-- ── voidblade tip rising over right pauldron ── -->
  <rect x="55" y="32" width="1" height="9" fill="#0f380f"/>
  <rect x="54" y="33" width="1" height="7" fill="#306230"/>
  <rect x="56" y="33" width="1" height="7" fill="#306230"/>
  <rect x="55" y="30" width="1" height="2" fill="#0f380f"/>
  <rect x="54" y="31" width="3" height="1" fill="#0f380f"/>

  <!-- ── staff of the destroyer over left shoulder ── -->
  <rect x="8" y="32" width="1" height="10" fill="#0f380f"/>
  <rect x="9" y="33" width="1" height="9"  fill="#306230"/>
  <rect x="7" y="29" width="3" height="3"  fill="#0f380f"/>
  <rect x="8" y="30" width="1" height="1"  fill="#9bbc0f"/>
</svg>
