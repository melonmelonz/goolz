name = "goolz"
compatibility_date = "2024-09-01"
pages_build_output_dir = "."

# ── KV: visitor counter (goolz) ──────────────────────────
[[kv_namespaces]]
binding = "GOOLZ_KV"
id = "d329b89f482c41eda425aa955d1ca494"

# ── KV: notepad docs (next-chapter app) ──────────────────
[[kv_namespaces]]
binding = "NOTEPAD_DOCS"
id = "2d8ce6ac0309462bbc2ff3934f2a33c1"

# ── Durable Object: Playing With Goolz multiplayer rooms ──
# Pages projects can't define DOs inline. The Room class is exported
# from the `pwg-rooms` Worker (see ../pwg-rooms/wrangler.toml). This
# binding consumes it via `script_name`. The Worker must be deployed
# before this Pages project can deploy successfully.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"
script_name = "pwg-rooms"
