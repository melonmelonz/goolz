name = "pwg-rooms"
main = "src/worker.js"
compatibility_date = "2024-09-01"

# Cloudflare Pages projects can't define Durable Objects inline. The DO
# lives in this small Worker; the goolz Pages project binds to it via
# `script_name = "pwg-rooms"` (see ../wrangler.toml).

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
